<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EnVivo | Administración de Categorías</title>

    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                main: '#FF6F28',
                darker: '#BF371C',
                lighter: '#FFCA99',
                subtle: '#E3EDFF',
                error: '#FF3B3B',
                warning: '#FFCC00',
                info: '#0063F7',
                success: '#06C270',
              }
            }
          }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-[#f8f9fa] min-h-screen">

<div th:replace="~{components/navbar :: navbar('admin','categories')}"></div>

<main class="max-w-[1400px] mx-auto p-8">

    <!-- LISTADO -->
    <section class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-gray-100 h-fit">

        <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
            <h3 class="text-gray-800 font-black flex items-center gap-3 text-lg uppercase tracking-tighter">
                <i class="fa-solid fa-tag text-main"></i>
                Categorías Actuales
            </h3>
            <div class="flex items-center gap-3">
                <button type="button"
                        id="open-category-modal"
                        class="px-4 py-2 rounded-full bg-main text-white text-xs font-black uppercase tracking-widest hover:bg-darker transition-colors">
                    Añadir
                </button>
                <span class="text-[10px] bg-main/10 text-main px-3 py-1 rounded-full font-black uppercase tracking-widest"
                      th:text="${#lists.size(categorias) + ' total'}"></span>
            </div>
        </div>

        <!-- MENSAJES -->
        <div th:if="${param.exito != null or param.error_en_uso != null or param.error_general != null}" class="px-8 pt-6 pb-6 border-b border-gray-100">
            <div th:if="${param.exito != null}"
                 class="mb-6 p-4 rounded-2xl bg-success/10 border border-success/30 text-success text-sm font-bold flex items-center gap-3">
                <i class="fa-solid fa-circle-check"></i>
                Categoría procesada correctamente.
            </div>
            <div th:if="${param.error_en_uso != null or param.error_general != null}"
                 class="p-4 rounded-2xl bg-error/10 border border-error/30 text-error text-sm font-bold flex items-center gap-3">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${param.error_en_uso != null ? 'No es posible eliminar: Tiene eventos asociados.' : 'Ha ocurrido un error inesperado.'}"></span>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50/50 border-b border-gray-100">
                    <tr class="text-gray-400 text-[10px] uppercase tracking-[0.2em]">
                        <th class="px-8 py-6 font-black">Nombre</th>
                        <th class="px-8 py-6 font-black text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                    <tr th:each="c : ${categorias}" class="group hover:bg-subtle/20 transition-all">
                        <td class="px-8 py-5 flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-main/10 flex items-center justify-center text-main font-bold group-hover:bg-main group-hover:text-white transition-all">
                                <i class="fa-solid fa-tag text-sm"></i>
                            </div>
                            <span class="font-black text-gray-800 text-sm group-hover:text-main transition-colors"
                                  th:text="${c.name}">
                            </span>
                        </td>
                        <td class="px-8 py-5 text-center">
                            <div class="flex items-center justify-center gap-2">
                                <a th:href="@{/categories/edit/{id}(id=${c.categoryId})}"
                                   class="btn-icon bg-info/5 text-info hover:bg-info hover:text-white">
                                    <i class="fa-solid fa-pencil text-xs"></i>
                                </a>
                                <a th:href="@{/categories/delete/{id}(id=${c.categoryId})}"
                                   onclick="return confirm('¿Eliminar esta categoría?')"
                                   class="btn-icon bg-error/5 text-error hover:bg-error hover:text-white">
                                    <i class="fa-solid fa-trash-can text-xs"></i>
                                </a>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(categorias)}">
                        <td colspan="2" class="text-center py-16">
                            <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-300">
                                <i class="fa-solid fa-folder-open text-2xl"></i>
                            </div>
                            <p class="text-gray-400 text-sm font-black uppercase tracking-widest">
                                No hay categorías registradas
                            </p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

</main>

<div id="category-modal"
     class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4"
     th:attr="data-edit-open=${categoria.categoryId != null}">
    <div class="relative w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        <button type="button"
                id="close-category-modal"
                aria-label="Cerrar formulario"
                class="absolute right-4 top-4 z-10 btn-icon bg-error/5 text-error hover:bg-error hover:text-white">
            <i class="fa-solid fa-xmark text-sm"></i>
        </button>
        <section th:replace="~{components/forms :: categoryForm}"></section>
    </div>
</div>

<script>
    const categoryModal = document.getElementById('category-modal');
    const openCategoryModal = document.getElementById('open-category-modal');
    const closeCategoryModal = document.getElementById('close-category-modal');

    function showCategoryModal() {
        if (!categoryModal) return;
        categoryModal.classList.remove('hidden');
        categoryModal.classList.add('flex');
    }

    function hideCategoryModal() {
        if (!categoryModal) return;
        categoryModal.classList.remove('flex');
        categoryModal.classList.add('hidden');
    }

    if (openCategoryModal) {
        openCategoryModal.addEventListener('click', showCategoryModal);
    }

    if (closeCategoryModal) {
        closeCategoryModal.addEventListener('click', hideCategoryModal);
    }

    if (categoryModal) {
        categoryModal.addEventListener('click', (event) => {
            if (event.target === categoryModal) {
                hideCategoryModal();
            }
        });

        if (categoryModal.dataset.editOpen === 'true') {
            showCategoryModal();
        }
    }
</script>
</body>
</html>
