<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EnVivo | Administración de Categorías</title>

    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                main: '#FF6F28',
                darker: '#BF371C',
                lighter: '#FFCA99',
                subtle: '#E3EDFF',
                error: '#FF3B3B',
                warning: '#FFCC00',
                info: '#0063F7',
                success: '#06C270',
              }
            }
          }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-[#f8f9fa] min-h-screen">

<div th:replace="~{components/navbar :: navbar('admin','categories')}"></div>

<main class="max-w-[1400px] mx-auto p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">

    <!-- FORM -->
    <div class="lg:col-span-4">
        <section class="bg-white rounded-[2.5rem] p-8 shadow-xl shadow-gray-200/50 border border-gray-50 sticky top-8">

            <h2 class="font-black text-2xl mb-8 tracking-tight uppercase"
                th:classappend="${categoria.categoryId == null ? 'text-main' : 'text-info'}"
                th:text="${categoria.categoryId == null ? 'Nueva Categoría' : 'Editar Categoría'}">
            </h2>

            <form th:action="@{/categories/create}" th:object="${categoria}" method="POST" class="space-y-6">

                <input type="hidden" th:field="*{categoryId}" />

                <div class="space-y-1">
                    <label class="text-xs font-black text-gray-400 uppercase ml-1 tracking-widest">
                        Nombre de categoría
                    </label>
                    <input type="text"
                           th:field="*{name}"
                           required
                           placeholder="Ej: Teatro, Rock, Stand Up..."
                           class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-lighter transition-all text-sm font-medium">
                </div>

                <button type="submit"
                        th:classappend="${categoria.categoryId == null ? 'bg-main shadow-main/20 hover:bg-darker' : 'bg-info shadow-info/20 hover:bg-blue-700'}"
                        class="w-full text-white font-black py-4 rounded-2xl transition-all shadow-lg transform hover:-translate-y-1 mt-4">
                    <span th:text="${categoria.categoryId == null ? 'Añadir Categoría' : 'Actualizar Categoría'}"></span>
                </button>

                <a th:if="${categoria.categoryId != null}"
                   th:href="@{/categories}"
                   class="block text-center text-xs font-black text-gray-400 hover:text-error uppercase tracking-widest transition-colors">
                    Cancelar Edición
                </a>
            </form>
        </section>
    </div>

    <!-- LISTADO -->
    <section class="lg:col-span-8 bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-gray-100 h-fit">

        <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
            <h3 class="text-gray-800 font-black flex items-center gap-3 text-lg uppercase tracking-tighter">
                <i class="fa-solid fa-tag text-main"></i>
                Categorías Actuales
            </h3>
            <span class="text-[10px] bg-main/10 text-main px-3 py-1 rounded-full font-black uppercase tracking-widest"
                  th:text="${#lists.size(categorias) + ' total'}"></span>
        </div>

        <!-- MENSAJES -->
        <div th:if="${param.exito != null or param.error_en_uso != null or param.error_general != null}" class="px-8 pt-6 pb-6 border-b border-gray-100">
            <div th:if="${param.exito != null}"
                 class="mb-6 p-4 rounded-2xl bg-success/10 border border-success/30 text-success text-sm font-bold flex items-center gap-3">
                <i class="fa-solid fa-circle-check"></i>
                Categoría procesada correctamente.
            </div>
            <div th:if="${param.error_en_uso != null or param.error_general != null}"
                 class="p-4 rounded-2xl bg-error/10 border border-error/30 text-error text-sm font-bold flex items-center gap-3">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${param.error_en_uso != null ? 'No es posible eliminar: Tiene eventos asociados.' : 'Ha ocurrido un error inesperado.'}"></span>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50/50 border-b border-gray-100">
                    <tr class="text-gray-400 text-[10px] uppercase tracking-[0.2em]">
                        <th class="px-8 py-6 font-black">Nombre</th>
                        <th class="px-8 py-6 font-black text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                    <tr th:each="c : ${categorias}" class="group hover:bg-subtle/20 transition-all">
                        <td class="px-8 py-5 flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl bg-main/10 flex items-center justify-center text-main font-bold group-hover:bg-main group-hover:text-white transition-all">
                                <i class="fa-solid fa-tag text-sm"></i>
                            </div>
                            <span class="font-black text-gray-800 text-sm group-hover:text-main transition-colors"
                                  th:text="${c.name}">
                            </span>
                        </td>
                        <td class="px-8 py-5 text-center">
                            <div class="flex items-center justify-center gap-2">
                                <a th:href="@{/categories/edit/{id}(id=${c.categoryId})}"
                                   class="w-9 h-9 inline-flex items-center justify-center rounded-xl bg-info/5 text-info hover:bg-info hover:text-white transition-all shadow-sm">
                                    <i class="fa-solid fa-pencil text-xs"></i>
                                </a>
                                <a th:href="@{/categories/delete/{id}(id=${c.categoryId})}"
                                   onclick="return confirm('¿Eliminar esta categoría?')"
                                   class="w-9 h-9 inline-flex items-center justify-center rounded-xl bg-error/5 text-error hover:bg-error hover:text-white transition-all shadow-sm">
                                    <i class="fa-solid fa-trash-can text-xs"></i>
                                </a>
                            </div>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(categorias)}">
                        <td colspan="2" class="text-center py-16">
                            <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-300">
                                <i class="fa-solid fa-folder-open text-2xl"></i>
                            </div>
                            <p class="text-gray-400 text-sm font-black uppercase tracking-widest">
                                No hay categorías registradas
                            </p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

</main>
</body>
</html>
