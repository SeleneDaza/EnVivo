<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<section th:fragment="categoryForm" class="bg-white rounded-[2.5rem] p-8 shadow-xl shadow-gray-200/50 border border-gray-50 sticky top-8">

    <h2 class="font-black text-2xl mb-8 tracking-tight uppercase"
        th:classappend="${isEditMode ? 'text-info' : 'text-main'}"
        th:text="${isEditMode ? 'Editar Categoría' : 'Nueva Categoría'}">
    </h2>

    <form th:action="${isEditMode ? '/categories/edit/' + editingCategoryId : '/categories/create'}"
          th:object="${categoria}" method="POST" class="space-y-6">

        <div class="space-y-1">
            <label class="text-xs font-black text-gray-400 uppercase ml-1 tracking-widest">
                Nombre de categoría
            </label>
            <input type="text"
                   th:field="*{name}"
                   required
                   placeholder="Ej: Teatro, Rock, Stand Up..."
                   class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-lighter transition-all text-sm font-medium">
        </div>

        <button type="submit"
                th:classappend="${isEditMode ? 'bg-info hover:bg-blue-700 shadow-info/20' : 'bg-main hover:bg-darker shadow-main/20'}"
                class="mt-4 shadow-lg">
            <span th:text="${isEditMode ? 'Actualizar Categoría' : 'Añadir Categoría'}"></span>
        </button>

        <a th:if="${isEditMode}"
           th:href="@{/categories}"
           class="block text-center text-xs font-black text-gray-400 hover:text-error uppercase tracking-widest transition-colors">
            Cancelar Edición
        </a>
    </form>
</section>

<section th:fragment="adminEventForm" class="bg-white rounded-[2.5rem] p-8 shadow-xl shadow-gray-200/50 border border-gray-50 sticky top-8">
    <h2 class="font-black text-2xl mb-8 tracking-tight uppercase"
        th:classappend="${evento.event_id == null ? 'text-main' : 'text-info'}"
        th:text="${evento.event_id == null ? 'Crear Evento' : 'Editar Evento'}">
    </h2>

    <form th:action="${evento.event_id == null ? '/admin/guardar' : '/admin/editar/' + evento.event_id}"
          th:object="${evento}" method="POST" enctype="multipart/form-data" class="space-y-6">

        <input type="hidden" th:field="*{event_id}">

        <div class="space-y-1">
            <label class="text-xs font-black text-gray-400 uppercase ml-1 tracking-widest">Nombre del Evento</label>
            <input type="text" th:field="*{name}" id="event-name" required maxlength="105"
                   class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-lighter transition-all text-sm font-medium"
                   placeholder="Ej: Concierto de Rock">
            <div id="name-error" class="hidden text-[10px] text-error font-bold mt-1">⚠️ Máximo 100 caracteres alcanzado.</div>
            <p id="char-count" class="text-[10px] text-right text-gray-400 font-bold">0/100</p>
        </div>

        <div class="space-y-1">
            <label class="text-xs font-black text-gray-400 uppercase ml-1 tracking-widest">Descripción</label>
            <textarea th:field="*{description}" id="event-desc" maxlength="510" rows="3"
                      class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-lighter transition-all text-sm font-medium resize-none"
                      placeholder="Breve detalle del evento..."></textarea>
            <p id="desc-char-count" class="text-[10px] text-right text-gray-400 font-bold">0/500</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="space-y-1">
                <label class="text-xs font-black text-gray-400 uppercase ml-1 tracking-widest">Fecha</label>
                <input type="date" th:field="*{date}" id="fechaEvento"
                       class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-lighter outline-none">
            </div>
        </div>

        <div class="space-y-1">
            <label class="text-xs font-black text-gray-400 uppercase ml-1 tracking-widest">Categoría</label>
            <select th:field="*{category}" class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-lighter outline-none appearance-none">
                <option value="">-- Sin categoría --</option>
                <option th:each="cat : ${categorias}" th:value="${cat.name}" th:text="${cat.name}"></option>
            </select>
        </div>

        <div class="space-y-3">
            <div class="flex items-center justify-between">
                <label class="text-xs font-black text-gray-400 uppercase ml-1 tracking-widest">Entradas</label>
                <button type="button" id="add-ticket-row"
                        class="text-[10px] font-black uppercase tracking-widest text-info hover:text-main transition-colors">
                    + Agregar entrada
                </button>
            </div>

            <div id="tickets-container" class="space-y-3">
                <div th:if="${evento.tickets != null and !#lists.isEmpty(evento.tickets)}"
                     th:each="ticket, stat : ${evento.tickets}"
                     class="ticket-row grid grid-cols-1 md:grid-cols-12 gap-3 bg-gray-50 border border-gray-100 rounded-2xl p-3">
                    <div class="md:col-span-5">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Tipo</label>
                        <select th:name="${'tickets[' + stat.index + '].ticketTypeId'}"
                                class="js-ticket-type w-full mt-1 bg-white border border-gray-200 rounded-xl px-3 py-2 text-xs font-medium outline-none focus:ring-2 focus:ring-lighter">
                            <option value="">Seleccionar tipo...</option>
                            <option th:each="tipo : ${tiposEntrada}"
                                    th:value="${tipo.id}"
                                    th:text="${tipo.name}"
                                    th:selected="${tipo.id == ticket.ticketTypeId}"></option>
                        </select>
                    </div>
                    <div class="md:col-span-3">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Precio</label>
                        <input type="number" min="0" step="1"
                               th:name="${'tickets[' + stat.index + '].price'}"
                               th:value="${ticket.price}"
                               class="js-ticket-price w-full mt-1 bg-white border border-gray-200 rounded-xl px-3 py-2 text-xs font-medium outline-none focus:ring-2 focus:ring-lighter"
                               placeholder="0">
                    </div>
                    <div class="md:col-span-3">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Cantidad</label>
                        <input type="number" min="1" step="1"
                               th:name="${'tickets[' + stat.index + '].availableQuantity'}"
                               th:value="${ticket.availableQuantity}"
                               class="js-ticket-quantity w-full mt-1 bg-white border border-gray-200 rounded-xl px-3 py-2 text-xs font-medium outline-none focus:ring-2 focus:ring-lighter"
                               placeholder="1">
                    </div>
                    <div class="md:col-span-1 flex items-end justify-end">
                        <button type="button" class="remove-ticket-row btn-icon bg-error/5 text-error hover:bg-error hover:text-white" aria-label="Eliminar fila de ticket">
                            <i class="fa-solid fa-trash-can text-xs"></i>
                        </button>
                    </div>
                </div>
            </div>

            <p id="tickets-empty-help" class="text-[10px] text-gray-400 font-bold ml-1"
               th:classappend="${evento.tickets != null and !#lists.isEmpty(evento.tickets)} ? ' hidden' : ''">
                Aun no hay entradas configuradas para este evento.
            </p>

            <template id="ticket-row-template">
                <div class="ticket-row grid grid-cols-1 md:grid-cols-12 gap-3 bg-gray-50 border border-gray-100 rounded-2xl p-3">
                    <div class="md:col-span-5">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Tipo</label>
                        <select class="js-ticket-type w-full mt-1 bg-white border border-gray-200 rounded-xl px-3 py-2 text-xs font-medium outline-none focus:ring-2 focus:ring-lighter">
                            <option value="">Seleccionar tipo...</option>
                            <option th:each="tipo : ${tiposEntrada}" th:value="${tipo.id}" th:text="${tipo.name}"></option>
                        </select>
                    </div>
                    <div class="md:col-span-3">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Precio</label>
                        <input type="number" min="0" step="1" class="js-ticket-price w-full mt-1 bg-white border border-gray-200 rounded-xl px-3 py-2 text-xs font-medium outline-none focus:ring-2 focus:ring-lighter" placeholder="0">
                    </div>
                    <div class="md:col-span-3">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Cantidad</label>
                        <input type="number" min="1" step="1" class="js-ticket-quantity w-full mt-1 bg-white border border-gray-200 rounded-xl px-3 py-2 text-xs font-medium outline-none focus:ring-2 focus:ring-lighter" placeholder="1">
                    </div>
                    <div class="md:col-span-1 flex items-end justify-end">
                        <button type="button" class="remove-ticket-row btn-icon bg-error/5 text-error hover:bg-error hover:text-white" aria-label="Eliminar fila de ticket">
                            <i class="fa-solid fa-trash-can text-xs"></i>
                        </button>
                    </div>
                </div>
            </template>
        </div>

        <div class="space-y-2">
            <label class="text-xs font-black text-gray-400 uppercase ml-1 tracking-widest">Imagen</label>
            <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-2xl border-2 border-dashed border-gray-200 hover:border-lighter transition-all group">
                <input type="file" name="file" accept=".jpg, .jpeg, .png"
                       class="text-[10px] text-gray-400 w-full cursor-pointer file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-black file:bg-subtle file:text-info hover:file:bg-info hover:file:text-white transition-all">
            </div>
        </div>

        <button type="submit"
                th:classappend="${evento.event_id == null ? 'bg-main hover:bg-darker shadow-main/20' : 'bg-info hover:bg-blue-700 shadow-info/20'}"
                class="mt-4 shadow-lg">
            <span th:text="${evento.event_id == null ? 'Crear Evento' : 'Guardar Cambios'}"></span>
        </button>

        <a th:if="${evento.event_id != null}" th:href="@{/admin}"
           class="block text-center text-xs font-black text-gray-400 hover:text-error uppercase tracking-widest transition-colors">
            Cancelar Edición
        </a>
    </form>
</section>

<section th:fragment="ticketTypeForm" class="bg-white rounded-[2.5rem] p-8 shadow-xl shadow-gray-200/50 border border-gray-50 sticky top-8">

    <h2 class="font-black text-2xl mb-8 tracking-tight uppercase"
        th:classappend="${tipoEntrada.id == null ? 'text-main' : 'text-info'}"
        th:text="${tipoEntrada.id == null ? 'Nuevo Tipo de Entrada' : 'Editar Tipo de Entrada'}">
        Nuevo Tipo de Entrada
    </h2>

    <form th:action="@{/ticket-types/create}" th:object="${tipoEntrada}" method="POST" class="space-y-6">

        <input type="hidden" th:field="*{id}" />

        <div class="space-y-1">
            <label for="ticket-type-name" class="text-xs font-black text-gray-400 uppercase ml-1 tracking-widest">
                Nombre del tipo
            </label>
            <input type="text"
                   id="ticket-type-name"
                   th:field="*{name}"
                   required
                   placeholder="Ej: General, VIP, Platino..."
                   class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-lighter transition-all text-sm font-medium">
        </div>

        <button type="submit"
                th:classappend="${tipoEntrada.id == null ? 'bg-main hover:bg-darker shadow-main/20' : 'bg-info hover:bg-blue-700 shadow-info/20'}"
                class="mt-4 shadow-lg">
            <span th:text="${tipoEntrada.id == null ? 'Añadir Tipo de Entrada' : 'Actualizar Tipo de Entrada'}"></span>
        </button>

        <a th:if="${tipoEntrada.id != null}"
           th:href="@{/ticket-types}"
           class="block text-center text-xs font-black text-gray-400 hover:text-error uppercase tracking-widest transition-colors">
            Cancelar Edicion
        </a>
    </form>
</section>

</body>
</html>
