<div th:fragment="navbar(tipo, active)">
    <nav class="flex items-center justify-between px-4 sm:px-10 py-4 bg-white shadow-sm border-b border-gray-100">

        <div class="flex items-center gap-3 shrink-0">
            <a th:href="@{/}" class="text-2xl sm:text-3xl font-black text-main tracking-tighter">
                EnVivo
            </a>
            <span th:if="${tipo == 'admin'}"
                  class="text-[10px] px-2 py-0.5 bg-error/10 text-error font-black uppercase rounded-md tracking-widest">
                admin
            </span>
        </div>

        <div class="hidden md:flex items-center justify-center gap-3 flex-1">
            <th:block th:if="${tipo == 'admin'}">
                <a th:href="@{/admin}"
                   th:classappend="${active == 'admin'} ? 'bg-main text-white shadow-md' : 'border border-main text-main hover:bg-subtle'"
                   class="px-4 py-1.5 text-sm font-semibold rounded-full transition-all duration-200">
                    Eventos
                </a>
                <a th:href="@{/categories}"
                   th:classappend="${active == 'categories'} ? 'bg-main text-white shadow-md' : 'border border-main text-main hover:bg-subtle'"
                   class="px-4 py-1.5 text-sm font-semibold rounded-full transition-all duration-200">
                    Categorias
                </a>
                <a th:href="@{/ticket-types}"
                   th:classappend="${active == 'ticket-types'} ? 'bg-main text-white shadow-md' : 'border border-main text-main hover:bg-subtle'"
                   class="px-4 py-1.5 text-sm font-semibold rounded-full transition-all duration-200">
                    Tipos de entrada
                </a>
                <a th:href="@{/reports}"
                   th:classappend="${active == 'reports'} ? 'bg-main text-white shadow-md' : 'border border-main text-main hover:bg-subtle'"
                   class="px-4 py-1.5 text-sm font-semibold rounded-full transition-all duration-200">
                    Reportes
                </a>
                <a th:href="@{/users}"
                   th:classappend="${active == 'users'} ? 'bg-main text-white shadow-md' : 'border border-main text-main hover:bg-subtle'"
                   class="px-4 py-1.5 text-sm font-semibold rounded-full transition-all duration-200">
                    Usuarios
                </a>
            </th:block>
        </div>

        <div class="flex items-center gap-4 shrink-0 relative">
            
            <a th:href="@{/admin}" sec:authorize="hasRole('ADMIN')" th:if="${tipo == 'user'}"
               class="hidden sm:block px-4 py-2 bg-main text-white text-sm font-semibold rounded-full shadow-md">
                Administrador
            </a>

            <div sec:authorize="isAuthenticated()" class="relative inline-block text-left" id="userDropdown">
                <button type="button" onclick="toggleMenu()" class="flex items-center justify-center w-10 h-10 rounded-full bg-orange-50 text-main hover:bg-orange-100 transition-all border border-orange-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </button>

                <div id="dropdownMenu" class="hidden absolute right-0 mt-2 w-52 bg-white rounded-xl shadow-xl border border-gray-100 py-2 z-50">
                    <div class="px-4 py-3 border-b border-gray-50">
                        <p class="text-[11px] uppercase tracking-wider text-gray-400 font-bold">Hola,</p>
                        <p class="text-sm font-black truncate text-gray-800" sec:authentication="name">Usuario</p>
                    </div>

                    <div class="py-1">
                        <a th:href="@{/favorites}" 
                           sec:authorize="hasAnyAuthority('CLIENTE', 'ROLE_CLIENTE')"
                           class="group flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                            <svg class="mr-3 text-gray-400 group-hover:text-main" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"></path>
                            </svg>
                            Mis Favoritos
                        </a>

                        <a th:href="@{/profile}" class="group flex items-center px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">
                            <svg class="mr-3 text-gray-400 group-hover:text-main" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            Mi Perfil
                        </a>

                        <hr class="my-1 border-gray-50">

                        <form th:action="@{/logout}" method="post" class="m-0">
                           <button type="submit" 
                            class="w-full group flex items-center px-4 py-2 text-sm font-bold !text-orange-500 hover:bg-orange-50 transition-colors border-none shadow-none">
    
                                <svg class="mr-3 !text-orange-500" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                    <polyline points="16 17 21 12 16 7"></polyline>
                                    <line x1="21" x2="9" y1="12" y2="12"></line>
                                </svg>

                                <span class="!text-orange-500">Cerrar sesión</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <a th:href="@{/index}" sec:authorize="isAnonymous()"
               class="text-xs sm:text-sm font-bold text-gray-400 hover:text-main transition-colors">
                Iniciar Sesión
            </a>
        </div>
    </nav>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('dropdownMenu');
            menu.classList.toggle('hidden');
        }

        // Cerrar si se hace clic fuera
        window.onclick = function(event) {
            const dropdown = document.getElementById('userDropdown');
            const menu = document.getElementById('dropdownMenu');
            if (dropdown && !dropdown.contains(event.target)) {
                if (menu && !menu.classList.contains('hidden')) {
                    menu.classList.add('hidden');
                }
            }
        }
    </script>
</div>
