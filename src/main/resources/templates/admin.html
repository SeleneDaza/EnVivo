<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6"> 
<head>
    <meta charset="UTF-8">
    <title>EnVivo | Administración</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                main: '#FF6F28',
                darker: '#BF371C',
                lighter: '#FFCA99',
                subtle: '#E3EDFF',
                error: '#FF3B3B',
                warning: '#FFCC00',
                info: '#0063F7',
                success: '#06C270',
              }
            }
          }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-[#f8f9fa] min-h-screen">

<div th:replace="~{components/navbar :: navbar('admin','admin')}"></div>

<main class="max-w-[1400px] mx-auto p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <div class="lg:col-span-4">
        <section class="bg-white rounded-[2.5rem] p-8 shadow-xl shadow-gray-200/50 border border-gray-50 sticky top-8">
            <h2 class="font-black text-2xl mb-8 tracking-tight uppercase"
                th:classappend="${evento.event_id == null ? 'text-main' : 'text-info'}"
                th:text="${evento.event_id == null ? 'Crear Evento' : 'Editar Evento'}">
            </h2>

            <form th:action="${evento.event_id == null ? '/admin/guardar' : '/admin/editar/' + evento.event_id}"
                  th:object="${evento}" method="POST" enctype="multipart/form-data" class="space-y-6">

                <input type="hidden" th:field="*{event_id}">

                <div class="space-y-1">
                    <label class="text-xs font-black text-gray-400 uppercase ml-1 tracking-widest">Nombre del Evento</label>
                    <input type="text" th:field="*{name}" id="event-name" required maxlength="105"
                           class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-lighter transition-all text-sm font-medium"
                           placeholder="Ej: Concierto de Rock">
                    <div id="name-error" class="hidden text-[10px] text-error font-bold mt-1">⚠️ Máximo 100 caracteres alcanzado.</div>
                    <p id="char-count" class="text-[10px] text-right text-gray-400 font-bold">0/100</p>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-black text-gray-400 uppercase ml-1 tracking-widest">Descripción</label>
                    <textarea th:field="*{description}" id="event-desc" maxlength="510" rows="3"
                              class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-lighter transition-all text-sm font-medium resize-none"
                              placeholder="Breve detalle del evento..."></textarea>
                    <p id="desc-char-count" class="text-[10px] text-right text-gray-400 font-bold">0/500</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-black text-gray-400 uppercase ml-1 tracking-widest">Fecha</label>
                        <input type="date" th:field="*{date}" id="fechaEvento"
                               class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-lighter outline-none">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-black text-gray-400 uppercase ml-1 tracking-widest">Categoría</label>
                    <select th:field="*{category}" class="w-full bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm font-medium focus:ring-2 focus:ring-lighter outline-none appearance-none">
                        <option value="">-- Sin categoría --</option>
                        <option th:each="cat : ${categorias}" th:value="${cat.name}" th:text="${cat.name}"></option>
                    </select>
                </div>

                <div class="space-y-3">
                    <div class="flex items-center justify-between">
                        <label class="text-xs font-black text-gray-400 uppercase ml-1 tracking-widest">Entradas</label>
                        <button type="button" id="add-ticket-row"
                                class="text-[10px] font-black uppercase tracking-widest text-info hover:text-main transition-colors">
                            + Agregar entrada
                        </button>
                    </div>

                    <div id="tickets-container" class="space-y-3">
                        <div th:if="${evento.tickets != null and !#lists.isEmpty(evento.tickets)}"
                             th:each="ticket, stat : ${evento.tickets}"
                             class="ticket-row grid grid-cols-1 md:grid-cols-12 gap-3 bg-gray-50 border border-gray-100 rounded-2xl p-3">
                            <div class="md:col-span-5">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Tipo</label>
                                <select th:name="${'tickets[' + stat.index + '].ticketTypeId'}"
                                        class="js-ticket-type w-full mt-1 bg-white border border-gray-200 rounded-xl px-3 py-2 text-xs font-medium outline-none focus:ring-2 focus:ring-lighter">
                                    <option value="">Seleccionar tipo...</option>
                                    <option th:each="tipo : ${tiposEntrada}"
                                            th:value="${tipo.id}"
                                            th:text="${tipo.name}"
                                            th:selected="${tipo.id == ticket.ticketTypeId}"></option>
                                </select>
                            </div>
                            <div class="md:col-span-3">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Precio</label>
                                <input type="number" min="0" step="1"
                                       th:name="${'tickets[' + stat.index + '].price'}"
                                       th:value="${ticket.price}"
                                       class="js-ticket-price w-full mt-1 bg-white border border-gray-200 rounded-xl px-3 py-2 text-xs font-medium outline-none focus:ring-2 focus:ring-lighter"
                                       placeholder="0">
                            </div>
                            <div class="md:col-span-3">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Cantidad</label>
                                <input type="number" min="1" step="1"
                                       th:name="${'tickets[' + stat.index + '].availableQuantity'}"
                                       th:value="${ticket.availableQuantity}"
                                       class="js-ticket-quantity w-full mt-1 bg-white border border-gray-200 rounded-xl px-3 py-2 text-xs font-medium outline-none focus:ring-2 focus:ring-lighter"
                                       placeholder="1">
                            </div>
                            <div class="md:col-span-1 flex items-end justify-end">
                                <button type="button" class="remove-ticket-row btn-icon bg-error/5 text-error hover:bg-error hover:text-white" aria-label="Eliminar fila de ticket">
                                    <i class="fa-solid fa-trash-can text-xs"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <p id="tickets-empty-help" class="text-[10px] text-gray-400 font-bold ml-1"
                       th:classappend="${evento.tickets != null and !#lists.isEmpty(evento.tickets)} ? ' hidden' : ''">
                        Aun no hay entradas configuradas para este evento.
                    </p>

                    <template id="ticket-row-template">
                        <div class="ticket-row grid grid-cols-1 md:grid-cols-12 gap-3 bg-gray-50 border border-gray-100 rounded-2xl p-3">
                            <div class="md:col-span-5">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Tipo</label>
                                <select class="js-ticket-type w-full mt-1 bg-white border border-gray-200 rounded-xl px-3 py-2 text-xs font-medium outline-none focus:ring-2 focus:ring-lighter">
                                    <option value="">Seleccionar tipo...</option>
                                    <option th:each="tipo : ${tiposEntrada}" th:value="${tipo.id}" th:text="${tipo.name}"></option>
                                </select>
                            </div>
                            <div class="md:col-span-3">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Precio</label>
                                <input type="number" min="0" step="1" class="js-ticket-price w-full mt-1 bg-white border border-gray-200 rounded-xl px-3 py-2 text-xs font-medium outline-none focus:ring-2 focus:ring-lighter" placeholder="0">
                            </div>
                            <div class="md:col-span-3">
                                <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Cantidad</label>
                                <input type="number" min="1" step="1" class="js-ticket-quantity w-full mt-1 bg-white border border-gray-200 rounded-xl px-3 py-2 text-xs font-medium outline-none focus:ring-2 focus:ring-lighter" placeholder="1">
                            </div>
                            <div class="md:col-span-1 flex items-end justify-end">
                                <button type="button" class="remove-ticket-row btn-icon bg-error/5 text-error hover:bg-error hover:text-white" aria-label="Eliminar fila de ticket">
                                    <i class="fa-solid fa-trash-can text-xs"></i>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="space-y-2">
                    <label class="text-xs font-black text-gray-400 uppercase ml-1 tracking-widest">Imagen</label>
                    <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-2xl border-2 border-dashed border-gray-200 hover:border-lighter transition-all group">
                        <input type="file" name="file" accept=".jpg, .jpeg, .png"
                               class="text-[10px] text-gray-400 w-full cursor-pointer file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-black file:bg-subtle file:text-info hover:file:bg-info hover:file:text-white transition-all">
                    </div>
                </div>

                <button type="submit"
                        th:classappend="${evento.event_id == null ? 'bg-main hover:bg-darker shadow-main/20' : 'bg-info hover:bg-blue-700 shadow-info/20'}"
                        class="mt-4 shadow-lg">
                    <span th:text="${evento.event_id == null ? 'Crear Evento' : 'Guardar Cambios'}"></span>
                </button>

                <a th:if="${evento.event_id != null}" th:href="@{/admin}"
                   class="block text-center text-xs font-black text-gray-400 hover:text-error uppercase tracking-widest transition-colors">
                    Cancelar Edición
                </a>
            </form>
        </section>
    </div>

    <section class="lg:col-span-8 bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-gray-100 h-fit">
        <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
            <h3 class="text-gray-800 font-black flex items-center gap-3 text-lg uppercase tracking-tighter">
                <i class="fa-solid fa-calendar text-main"></i>
                Eventos Registrados
            </h3>
            <span class="text-[10px] bg-main/10 text-main px-3 py-1 rounded-full font-black uppercase tracking-widest"
                  th:text="${#lists.size(eventos.content) + ' total'}"></span>
        </div>

        <!-- MENSAJES -->
        <div th:if="${param.exito != null or param.error != null}" class="px-8 pt-6">
            <div th:if="${param.exito != null}"
                 class="mb-6 p-4 rounded-2xl bg-success/10 border border-success/30 text-success text-sm font-bold flex items-center gap-3">
                <i class="fa-solid fa-circle-check"></i>
                Evento procesado correctamente.
            </div>
            <div th:if="${param.error != null}"
                 class="mb-6 p-4 rounded-2xl bg-error/10 border border-error/30 text-error text-sm font-bold flex items-center gap-3">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${param.error}">Error al procesar el evento.</span>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50/50 border-b border-gray-100">
                    <tr class="text-gray-400 text-[10px] uppercase tracking-[0.2em]">
                        <th class="px-8 py-6 font-black">Evento</th>
                        <th class="px-8 py-6 font-black">Fecha</th>
                        <th class="px-8 py-6 font-black text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                    <tr th:each="e : ${eventos.content}" class="group hover:bg-subtle/20 transition-all">
                        <td class="px-8 py-5 flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl overflow-hidden bg-gray-100 border border-gray-100 shadow-sm flex-shrink-0">
                                <img th:src="${e.image}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150'">
                            </div>
                            <div class="min-w-0">
                                <div class="font-black text-gray-800 truncate text-sm" th:text="${e.name}">Nombre</div>
                                <span th:if="${e.category != null}" class="inline-block mt-1 px-2 py-0.5 bg-lighter/20 text-main text-[9px] font-black rounded uppercase tracking-tighter" th:text="${e.category.name}">CATEGORIA</span>
                            </div>
                        </td>
                        <td class="px-8 py-5">
                            <span class="text-xs font-bold text-gray-500" th:text="${e.date}">2024-10-10</span>
                        </td>
                        <td class="px-8 py-5 text-center">
                            <div class="flex items-center justify-center gap-2">
                                <a th:href="@{/admin/editar/{id}(id=${e.event_id})}"
                                   class="btn-icon bg-info/5 text-info hover:bg-info hover:text-white">
                                    <i class="fa-solid fa-pencil text-xs"></i>
                                </a>
                                <a th:href="@{/admin/eliminar/{id}(id=${e.event_id})}"
                                   onclick="return confirm('¿Estás seguro de que deseas eliminar este evento?')"
                                   class="btn-icon bg-error/5 text-error hover:bg-error hover:text-white">
                                    <i class="fa-solid fa-trash-can text-xs"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script>
    // Configuración de fecha mínima y contadores 
    const fechaInput = document.getElementById('fechaEvento');
    if(fechaInput) fechaInput.min = new Date().toISOString().split('T')[0];

    function setupCounter(inputId, counterId, limit) {
        const input = document.getElementById(inputId);
        const counter = document.getElementById(counterId);
        if(!input || !counter) return;

        input.addEventListener('input', () => {
            const length = input.value.length;
            counter.textContent = `${length}/${limit}`;
            if (length >= limit) {
                counter.classList.replace('text-gray-400', 'text-error');
                input.classList.add('ring-2', 'ring-error');
            } else {
                counter.classList.replace('text-error', 'text-gray-400');
                input.classList.remove('ring-error');
            }
        });
    }
    setupCounter('event-name', 'char-count', 100);
    setupCounter('event-desc', 'desc-char-count', 500);

    const ticketContainer = document.getElementById('tickets-container');
    const ticketTemplate = document.getElementById('ticket-row-template');
    const addTicketButton = document.getElementById('add-ticket-row');
    const ticketHelp = document.getElementById('tickets-empty-help');
    const eventForm = document.querySelector('form[th\\:object="${evento}"]') || document.querySelector('form');

    function updateTicketEmptyMessage() {
        if (!ticketHelp || !ticketContainer) return;
        ticketHelp.classList.toggle('hidden', ticketContainer.querySelectorAll('.ticket-row').length > 0);
    }

    function reindexTicketRows() {
        if (!ticketContainer) return;
        const rows = ticketContainer.querySelectorAll('.ticket-row');
        rows.forEach((row, index) => {
            const typeInput = row.querySelector('.js-ticket-type');
            const priceInput = row.querySelector('.js-ticket-price');
            const quantityInput = row.querySelector('.js-ticket-quantity');

            if (typeInput) typeInput.name = `tickets[${index}].ticketTypeId`;
            if (priceInput) priceInput.name = `tickets[${index}].price`;
            if (quantityInput) quantityInput.name = `tickets[${index}].availableQuantity`;
        });
        updateTicketEmptyMessage();
    }

    function addTicketRow() {
        if (!ticketContainer || !ticketTemplate) return;
        const row = ticketTemplate.content.firstElementChild.cloneNode(true);
        ticketContainer.appendChild(row);
        reindexTicketRows();
    }

    function isTicketRowEmpty(row) {
        const type = row.querySelector('.js-ticket-type')?.value?.trim();
        const price = row.querySelector('.js-ticket-price')?.value?.trim();
        const quantity = row.querySelector('.js-ticket-quantity')?.value?.trim();
        return !type && !price && !quantity;
    }

    if (addTicketButton) {
        addTicketButton.addEventListener('click', addTicketRow);
    }

    if (ticketContainer) {
        ticketContainer.addEventListener('click', (event) => {
            const removeButton = event.target.closest('.remove-ticket-row');
            if (!removeButton) return;
            removeButton.closest('.ticket-row')?.remove();
            reindexTicketRows();
        });
    }

    if (eventForm) {
        eventForm.addEventListener('submit', () => {
            if (!ticketContainer) return;
            ticketContainer.querySelectorAll('.ticket-row').forEach((row) => {
                if (isTicketRowEmpty(row)) {
                    row.remove();
                }
            });
            reindexTicketRows();
        });
    }

    reindexTicketRows();
</script>
</body>
</html>
