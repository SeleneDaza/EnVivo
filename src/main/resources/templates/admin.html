<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6"> 
<head>
    <meta charset="UTF-8">
    <title>EnVivo | Administración</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                main: '#FF6F28',
                darker: '#BF371C',
                lighter: '#FFCA99',
                subtle: '#E3EDFF',
                error: '#FF3B3B',
                warning: '#FFCC00',
                info: '#0063F7',
                success: '#06C270',
              }
            }
          }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-[#f8f9fa] min-h-screen">

<div th:replace="~{components/navbar :: navbar('admin','admin')}"></div>

<main class="max-w-[1400px] mx-auto p-8">

    <section class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-gray-100 h-fit">
        <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
            <h3 class="text-gray-800 font-black flex items-center gap-3 text-lg uppercase tracking-tighter">
                <i class="fa-solid fa-calendar text-main"></i>
                Eventos Registrados
            </h3>
            <div class="flex items-center gap-3">
                <button type="button"
                        id="open-admin-modal"
                        class="px-4 py-2 rounded-full bg-main text-white text-xs font-black uppercase tracking-widest hover:bg-darker transition-colors">
                    Añadir
                </button>
                <span class="text-[10px] bg-main/10 text-main px-3 py-1 rounded-full font-black uppercase tracking-widest"
                      th:text="${#lists.size(eventos.content) + ' total'}"></span>
            </div>
        </div>

        <!-- MENSAJES -->
        <div th:if="${param.exito != null or param.error != null}" class="px-8 pt-6">
            <div th:if="${param.exito != null}"
                 class="mb-6 p-4 rounded-2xl bg-success/10 border border-success/30 text-success text-sm font-bold flex items-center gap-3">
                <i class="fa-solid fa-circle-check"></i>
                Evento procesado correctamente.
            </div>
            <div th:if="${param.error != null}"
                 class="mb-6 p-4 rounded-2xl bg-error/10 border border-error/30 text-error text-sm font-bold flex items-center gap-3">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${param.error}">Error al procesar el evento.</span>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50/50 border-b border-gray-100">
                    <tr class="text-gray-400 text-[10px] uppercase tracking-[0.2em]">
                        <th class="px-8 py-6 font-black">Evento</th>
                        <th class="px-8 py-6 font-black">Fecha</th>
                        <th class="px-8 py-6 font-black text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                    <tr th:each="e : ${eventos.content}" class="group hover:bg-subtle/20 transition-all">
                        <td class="px-8 py-5 flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl overflow-hidden bg-gray-100 border border-gray-100 shadow-sm flex-shrink-0">
                                <img th:src="${e.image}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150'">
                            </div>
                            <div class="min-w-0">
                                <div class="font-black text-gray-800 truncate text-sm" th:text="${e.name}">Nombre</div>
                                <span th:if="${e.category != null}" class="inline-block mt-1 px-2 py-0.5 bg-lighter/20 text-main text-[9px] font-black rounded uppercase tracking-tighter" th:text="${e.category.name}">CATEGORIA</span>
                            </div>
                        </td>
                        <td class="px-8 py-5">
                            <span class="text-xs font-bold text-gray-500" th:text="${e.date}">2024-10-10</span>
                        </td>
                        <td class="px-8 py-5 text-center">
                            <div class="flex items-center justify-center gap-2">
                                <a th:href="@{/admin/editar/{id}(id=${e.event_id})}"
                                   class="btn-icon bg-info/5 text-info hover:bg-info hover:text-white">
                                    <i class="fa-solid fa-pencil text-xs"></i>
                                </a>
                                <a th:href="@{/admin/eliminar/{id}(id=${e.event_id})}"
                                   onclick="return confirm('¿Estás seguro de que deseas eliminar este evento?')"
                                   class="btn-icon bg-error/5 text-error hover:bg-error hover:text-white">
                                    <i class="fa-solid fa-trash-can text-xs"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<div id="admin-modal"
     class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4"
     th:attr="data-edit-open=${evento.event_id != null}">
    <div class="relative w-full max-w-3xl max-h-[90vh] overflow-y-auto">
        <button type="button"
                id="close-admin-modal"
                aria-label="Cerrar formulario"
                class="absolute right-4 top-4 z-10 btn-icon bg-error/5 text-error hover:bg-error hover:text-white">
            <i class="fa-solid fa-xmark text-sm"></i>
        </button>
        <section th:replace="~{components/forms :: adminEventForm}"></section>
    </div>
</div>

<script>
    const adminModal = document.getElementById('admin-modal');
    const openAdminModal = document.getElementById('open-admin-modal');
    const closeAdminModal = document.getElementById('close-admin-modal');

    function showAdminModal() {
        if (!adminModal) return;
        adminModal.classList.remove('hidden');
        adminModal.classList.add('flex');
    }

    function hideAdminModal() {
        if (!adminModal) return;
        adminModal.classList.remove('flex');
        adminModal.classList.add('hidden');
    }

    if (openAdminModal) {
        openAdminModal.addEventListener('click', showAdminModal);
    }

    if (closeAdminModal) {
        closeAdminModal.addEventListener('click', hideAdminModal);
    }

    if (adminModal) {
        adminModal.addEventListener('click', (event) => {
            if (event.target === adminModal) {
                hideAdminModal();
            }
        });

        if (adminModal.dataset.editOpen === 'true') {
            showAdminModal();
        }
    }

    // Configuración de fecha mínima y contadores
    const fechaInput = document.getElementById('fechaEvento');
    if(fechaInput) fechaInput.min = new Date().toISOString().split('T')[0];

    function setupCounter(inputId, counterId, limit) {
        const input = document.getElementById(inputId);
        const counter = document.getElementById(counterId);
        if(!input || !counter) return;

        input.addEventListener('input', () => {
            const length = input.value.length;
            counter.textContent = `${length}/${limit}`;
            if (length >= limit) {
                counter.classList.replace('text-gray-400', 'text-error');
                input.classList.add('ring-2', 'ring-error');
            } else {
                counter.classList.replace('text-error', 'text-gray-400');
                input.classList.remove('ring-error');
            }
        });
    }
    setupCounter('event-name', 'char-count', 100);
    setupCounter('event-desc', 'desc-char-count', 500);

    const ticketContainer = document.getElementById('tickets-container');
    const ticketTemplate = document.getElementById('ticket-row-template');
    const addTicketButton = document.getElementById('add-ticket-row');
    const ticketHelp = document.getElementById('tickets-empty-help');
    const eventForm = document.querySelector('form[th\\:object="${evento}"]') || document.querySelector('form');

    function updateTicketEmptyMessage() {
        if (!ticketHelp || !ticketContainer) return;
        ticketHelp.classList.toggle('hidden', ticketContainer.querySelectorAll('.ticket-row').length > 0);
    }

    function reindexTicketRows() {
        if (!ticketContainer) return;
        const rows = ticketContainer.querySelectorAll('.ticket-row');
        rows.forEach((row, index) => {
            const typeInput = row.querySelector('.js-ticket-type');
            const priceInput = row.querySelector('.js-ticket-price');
            const quantityInput = row.querySelector('.js-ticket-quantity');

            if (typeInput) typeInput.name = `tickets[${index}].ticketTypeId`;
            if (priceInput) priceInput.name = `tickets[${index}].price`;
            if (quantityInput) quantityInput.name = `tickets[${index}].availableQuantity`;
        });
        updateTicketEmptyMessage();
    }

    function updateDisabledTicketOptions() {
        if (!ticketContainer) return;
        
        const allSelects = Array.from(ticketContainer.querySelectorAll('.js-ticket-type'));
        
        // 1. Recopilar todos los valores que ya están seleccionados
        const selectedValues = allSelects
            .map(select => select.value)
            .filter(value => value !== ""); // Ignorar los vacíos

        // 2. Recorrer cada select para bloquear las opciones usadas en otros
        allSelects.forEach(select => {
            Array.from(select.options).forEach(option => {
                if (!option.value) return; // Ignorar la opción por defecto (ej: "Seleccione...")
                
                // Si la opción está en el array de seleccionados Y no es la que este select tiene elegida
                if (selectedValues.includes(option.value) && select.value !== option.value) {
                    option.disabled = true; // La bloqueamos
                } else {
                    option.disabled = false; // La liberamos
                }
            });
        });
    }

    function addTicketRow() {
        if (!ticketContainer || !ticketTemplate) return;
        const row = ticketTemplate.content.firstElementChild.cloneNode(true);
        ticketContainer.appendChild(row);
        reindexTicketRows();
        updateDisabledTicketOptions(); // <-- NUEVO
    }

    function isTicketRowEmpty(row) {
        const type = row.querySelector('.js-ticket-type')?.value?.trim();
        const price = row.querySelector('.js-ticket-price')?.value?.trim();
        const quantity = row.querySelector('.js-ticket-quantity')?.value?.trim();
        return !type && !price && !quantity;
    }

    if (addTicketButton) {
        addTicketButton.addEventListener('click', addTicketRow);
    }

    if (ticketContainer) {
        ticketContainer.addEventListener('click', (event) => {
            const removeButton = event.target.closest('.remove-ticket-row');
            if (!removeButton) return;
            removeButton.closest('.ticket-row')?.remove();
            reindexTicketRows();
            updateDisabledTicketOptions(); // <-- NUEVO
        });

        // <-- NUEVO EVENTO: Detectar cuando cambian la selección de una boleta -->
        ticketContainer.addEventListener('change', (event) => {
            if (event.target.classList.contains('js-ticket-type')) {
                updateDisabledTicketOptions();
            }
        });
    }

    if (eventForm) {
        eventForm.addEventListener('submit', () => {
            if (!ticketContainer) return;
            ticketContainer.querySelectorAll('.ticket-row').forEach((row) => {
                if (isTicketRowEmpty(row)) {
                    row.remove();
                }
            });
            reindexTicketRows();
        });
    }

    reindexTicketRows();
</script>
</body>
</html>
