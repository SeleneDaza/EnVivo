<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EnVivo | Reportes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#f3f4f6] min-h-screen font-sans">

    <nav class="bg-gray-100 px-10 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2">
            <a th:href="@{/main}" 
            class="text-2xl font-bold text-[#e67e22] hover:text-[#d35400] transition-colors duration-300">
                EnVivo
            </a>
            <span class="text-sm font-semibold text-[#c0392b]">admin</span>
        </div>

        <div class="flex items-center gap-4">
            <a th:href="@{/admin}"
               class="px-6 py-2 border border-[#ff7f50] text-[#ff7f50] font-semibold rounded-full hover:bg-orange-50 transition">
                Eventos
            </a>

            <a th:href="@{/reports}"
               class="px-6 py-2 border border-[#ff7f50] text-[#ff7f50] font-semibold rounded-full hover:bg-orange-50 transition">
                Categorías
            </a>

            <a th:href="@{/categories}"
               class="px-6 py-2 bg-[#ff7f50] text-white font-semibold rounded-full shadow-sm hover:bg-[#e67348] transition">
                Reportes
            </a>
        </div>

        <div class="w-9 h-9 rounded-full bg-gray-300 flex items-center justify-center text-sm font-bold text-gray-600">
            A
        </div>
    </nav>

    <main class="max-w-5xl mx-auto mt-10 px-6">
        <div class="grid grid-cols-1 gap-8">

            <section>
                <div class="bg-white rounded-[2rem] p-8 border border-gray-200 shadow-sm">
                    <h3 class="text-gray-700 font-bold mb-6 flex items-center gap-2 text-lg">
                        Top 10 eventos favoritos
                    </h3>

                    <!-- Tabla -->
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left text-gray-600">
                            <thead>
                                <tr class="text-xs text-gray-400 uppercase border-b border-gray-200">
                                    <th class="pb-3 pr-4">#</th>
                                    <th class="pb-3 pr-4">Evento</th>
                                    <th class="pb-3 pr-4">Categoría</th>
                                    <th class="pb-3 text-center">
                                        <i class="fa-solid fa-heart text-red-400 mr-1"></i>
                                        Me interesa
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="item, iterStat : ${top10}"
                                    class="border-b border-gray-100 hover:bg-orange-50 transition-colors">

                                    <!-- Posición -->
                                    <td class="py-4 pr-4">
                                        <span th:if="${iterStat.index == 0}"
                                              class="w-8 h-8 flex items-center justify-center rounded-full bg-yellow-400 text-white font-bold text-xs">1</span>
                                        <span th:if="${iterStat.index == 1}"
                                              class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-400 text-white font-bold text-xs">2</span>
                                        <span th:if="${iterStat.index == 2}"
                                              class="w-8 h-8 flex items-center justify-center rounded-full bg-orange-400 text-white font-bold text-xs">3</span>
                                        <span th:if="${iterStat.index >= 3}"
                                              class="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 font-semibold text-xs"
                                              th:text="${iterStat.index + 1}"></span>
                                    </td>

                                    <!-- Nombre del evento -->
                                    <td class="py-4 pr-4">
                                        <div class="flex items-center gap-3">
                                            <div class="w-10 h-10 rounded-xl overflow-hidden bg-gray-100 flex-shrink-0">
                                                <img th:if="${item.evento.image != null and !item.evento.image.isEmpty()}"
                                                     th:src="${item.evento.image}"
                                                     class="w-full h-full object-cover"
                                                     alt="img"/>
                                                <div th:if="${item.evento.image == null or item.evento.image.isEmpty()}"
                                                     class="w-full h-full flex items-center justify-center text-gray-400">
                                                    <i class="fa-solid fa-calendar-days text-xs"></i>
                                                </div>
                                            </div>
                                            <span class="font-semibold text-gray-700" th:text="${item.evento.name}">Nombre</span>
                                        </div>
                                    </td>

                                    <!-- Categoría -->
                                    <td class="py-4 pr-4">
                                        <span th:if="${item.evento.category != null}"
                                              class="px-3 py-1 rounded-full bg-orange-100 text-orange-600 text-xs font-semibold"
                                              th:text="${item.evento.category.name}">Categoría</span>
                                        <span th:if="${item.evento.category == null}"
                                              class="text-gray-400 text-xs italic">Sin categoría</span>
                                    </td>

                                    <!-- Contador de interés (real desde tabla user_favorites) -->
                                    <td class="py-4 text-center">
                                        <span class="inline-flex items-center gap-1 px-3 py-1 rounded-full bg-red-50 text-red-500 font-bold text-sm">
                                            <i class="fa-solid fa-heart text-xs"></i>
                                            <span th:text="${item.totalInteresados}">0</span>
                                        </span>
                                    </td>
                                </tr>

                                <!-- Estado vacío -->
                                <tr th:if="${#lists.isEmpty(top10)}">
                                    <td colspan="4" class="text-center py-12">
                                        <p class="text-gray-400 text-sm italic">Aún no hay eventos con "Me interesa"</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

        </div>
    </main>

</body>
</html>
