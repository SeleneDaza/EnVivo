<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnVivo - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f3f4f6] min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md">
        
        <div class="text-center mb-10">
            <h1 class="text-5xl font-black text-[#ff5a1f] tracking-tighter mb-2">EnVivo</h1>
            <p class="text-gray-500 text-sm font-medium">Ingresa a tu cuenta para continuar.</p>
        </div>

        <form th:action="@{/login}" method="POST" class="space-y-5">
            
            <div th:if="${param.error}" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm font-bold text-center">
                Usuario o contraseña incorrectos.
            </div>

            <div th:if="${param.logout}" class="bg-blue-50 border border-blue-200 text-blue-600 px-4 py-3 rounded-xl text-sm font-bold text-center">
                Has cerrado sesión correctamente.
            </div>

            <div th:if="${param.registered}" class="bg-green-50 border border-green-200 text-green-600 px-4 py-3 rounded-xl text-sm font-bold text-center">
                ¡Cuenta creada con éxito! Ya puedes iniciar sesión.
            </div>

            <div th:if="${param.registerError}" class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm font-bold text-center">
                El usuario ya existe o las contraseñas no coinciden.
            </div>

            <div>
                <label for="username" class="block text-sm font-bold text-gray-700 mb-2 ml-2">Usuario</label>
                <input type="text" id="username" name="username" required
                       class="w-full px-6 py-3 rounded-full bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-200 transition-all text-sm font-medium"
                       placeholder="Nombre de usuario">
            </div>

            <div>
                <label for="password" class="block text-sm font-bold text-gray-700 mb-2 ml-2">Contraseña</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-6 py-3 rounded-full bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-200 transition-all text-sm font-medium"
                       placeholder="••••••••">
            </div>

            <button type="submit" 
                    class="w-full bg-[#ff5a1f] text-white font-black text-lg py-3 rounded-full hover:bg-[#e64a19] transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                Ingresar
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-gray-200"></span></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-4 text-gray-400 font-bold tracking-widest">O</span></div>
        </div>

        <div class="text-center">
            <p class="text-sm text-gray-500 font-medium mb-4">¿No tienes una cuenta aún?</p>
            <button onclick="document.getElementById('modalRegistro').classList.remove('hidden')"
                    class="w-full border-2 border-[#ff5a1f] text-[#ff5a1f] font-bold py-3 rounded-full hover:bg-orange-50 transition-colors">
                Crear cuenta nueva
            </button>
        </div>
    </div>

    <div id="modalRegistro" class="hidden fixed inset-0 bg-black bg-opacity-50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md relative">
            <button onclick="document.getElementById('modalRegistro').classList.add('hidden')" 
                    class="absolute top-6 right-6 text-gray-400 hover:text-gray-600 font-bold">✕</button>
            
            <h2 class="text-3xl font-black text-gray-800 mb-2">Regístrate</h2>
            <p class="text-gray-500 text-sm mb-6">Únete a la comunidad de EnVivo.</p>

            <form th:action="@{/register}" method="POST" class="space-y-4" id="formRegistro">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 ml-2">Usuario nuevo</label>
                    <input type="text" name="newUsername" required
                           class="w-full px-6 py-3 rounded-full bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-200 transition-all text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 ml-2">Contraseña</label>
                    <input type="password" name="newPassword" id="newPassword" required
                           class="w-full px-6 py-3 rounded-full bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-200 transition-all text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 ml-2">Confirmar Contraseña</label>
                    <input type="password" name="confirmPassword" id="confirmPassword" required
                           class="w-full px-6 py-3 rounded-full bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-200 transition-all text-sm">
                    <p id="msgConfirm" class="hidden text-xs font-bold mt-2 ml-2"></p>
                </div>
                <button type="submit" id="btnRegistrar"
                        class="w-full bg-black text-white font-black text-lg py-3 rounded-full hover:bg-gray-800 transition-all mt-4 disabled:opacity-40 disabled:cursor-not-allowed">
                    Registrarme
                </button>
            </form>
        </div>
    </div>
    <script>
        const passwordInput   = document.getElementById('newPassword');
        const confirmInput    = document.getElementById('confirmPassword');
        const msg             = document.getElementById('msgConfirm');
        const btnRegistrar    = document.getElementById('btnRegistrar');

        function validarContrasenas() {
            const pass    = passwordInput.value;
            const confirm = confirmInput.value;

            if (confirm === '') {
                msg.classList.add('hidden');
                btnRegistrar.disabled = false;
                return;
            }

            msg.classList.remove('hidden');

            if (pass === confirm) {
                msg.textContent = '✓ Las contraseñas coinciden';
                msg.className = 'text-xs font-bold mt-2 ml-2 text-green-600';
                confirmInput.classList.remove('border-red-400');
                confirmInput.classList.add('border-green-400');
                btnRegistrar.disabled = false;
            } else {
                msg.textContent = '✗ Las contraseñas no coinciden';
                msg.className = 'text-xs font-bold mt-2 ml-2 text-red-500';
                confirmInput.classList.remove('border-green-400');
                confirmInput.classList.add('border-red-400');
                btnRegistrar.disabled = true;
            }
        }

        confirmInput.addEventListener('input', validarContrasenas);
        passwordInput.addEventListener('input', validarContrasenas);
    </script>

</body>
</html>
