<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnVivo - Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                main: '#FF6F28',
                darker: '#BF371C',
                lighter: '#FFCA99',
                subtle: '#E3EDFF',
                error: '#FF3B3B',
                warning: '#FFCC00',
                info: '#0063F7',
                success: '#06C270',
              }
            }
          }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f8f9fa] 
             min-h-screen 
             flex 
             items-center 
             justify-center 
             px-4 sm:px-6 md:px-8 lg:px-12
             py-10 md:py-16 xl:py-24">

    <div class="bg-white 
                w-full 
                max-w-sm 
                sm:max-w-md 
                md:max-w-lg 
                xl:max-w-xl 
                p-6 
                sm:p-8 
                md:p-10 
                xl:p-12
                rounded-3xl 
                shadow-2xl 
                border border-gray-100">
        
        <div class="text-center mb-10">
            <h1 class="text-3xl 
                    sm:text-4xl 
                    md:text-5xl 
                    xl:text-6xl 
                    font-black text-main tracking-tighter mb-2">
                EnVivo
            </h1>
            <p class="text-gray-400 text-sm font-medium">Ingresa a tu cuenta para continuar.</p>
        </div>

        <form th:action="@{/login}" method="POST" class="space-y-5">
            
            <div th:if="${param.error}" class="bg-red-50 border border-error/20 text-error px-4 py-3 rounded-xl text-sm font-bold text-center">
                Usuario o contraseña incorrectos.
            </div>

            <div th:if="${param.logout}" class="bg-blue-50 border border-info/20 text-info px-4 py-3 rounded-xl text-sm font-bold text-center">
                Has cerrado sesión correctamente.
            </div>

            <div th:if="${param.registered}" class="bg-green-50 border border-success/20 text-success px-4 py-3 rounded-xl text-sm font-bold text-center">
                ¡Cuenta creada con éxito! Ya puedes iniciar sesión.
            </div>

            <div th:if="${param.registerError}" class="bg-red-50 border border-error/20 text-error px-4 py-3 rounded-xl text-sm font-bold text-center">
                El usuario ya existe o las contraseñas no coinciden.
            </div>

            <div>
                <label for="username" class="block text-sm font-bold text-gray-700 mb-2 ml-2">Usuario</label>
                <input type="text" id="username" name="username" required
                       class="w-full px-6 py-3 rounded-full bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-lighter transition-all text-sm font-medium"
                       placeholder="Nombre de usuario">
            </div>

            <div>
                <label for="password" class="block text-sm font-bold text-gray-700 mb-2 ml-2">Contraseña</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-6 py-3 rounded-full bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-lighter transition-all text-sm font-medium"
                       placeholder="••••••••">
            </div>

            <button type="submit"
                    class="w-full bg-main text-white font-black
                        text-base sm:text-lg md:text-xl
                        py-3 md:py-4
                        rounded-full
                        hover:bg-darker transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                Ingresar
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-gray-100"></span></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-4 text-gray-300 font-bold tracking-widest">O</span></div>
        </div>

        <div class="text-center">
            <p class="text-sm text-gray-400 font-medium mb-4">¿No tienes una cuenta aún?</p>
            <button onclick="document.getElementById('modalRegistro').classList.remove('hidden')"
                    class="w-full border-2 border-main text-main font-bold py-3 rounded-full hover:bg-subtle transition-colors">
                Crear cuenta nueva
            </button>
        </div>
    </div>

    <div id="modalRegistro" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white 
            w-full 
            max-w-sm 
            sm:max-w-md 
            md:max-w-lg 
            xl:max-w-xl 
            p-6 
            sm:p-8 
            md:p-10 
            xl:p-12
            rounded-3xl 
            shadow-2xl 
            relative border border-gray-100">
            <button onclick="document.getElementById('modalRegistro').classList.add('hidden')" 
                    class="absolute top-6 right-6 text-gray-300 hover:text-darker font-bold transition-colors">✕</button>
            
            <h2 class="text-3xl font-black text-gray-800 mb-2">Regístrate</h2>
            <p class="text-gray-400 text-sm mb-6">Únete a la comunidad de EnVivo.</p>

            <form th:action="@{/register}" method="POST" class="space-y-4" id="formRegistro">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 ml-2">Usuario nuevo</label>
                    <input type="text" name="newUsername" required
                           class="w-full px-6 py-3 rounded-full bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-lighter transition-all text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 ml-2">Contraseña</label>
                    <input type="password" name="newPassword" id="newPassword" required
                           class="w-full px-6 py-3 rounded-full bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-lighter transition-all text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1 ml-2">Confirmar Contraseña</label>
                    <input type="password" name="confirmPassword" id="confirmPassword" required
                           class="w-full px-6 py-3 rounded-full bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-lighter transition-all text-sm">
                    <p id="msgConfirm" class="hidden text-xs font-bold mt-2 ml-2"></p>
                </div>
                <button type="submit" id="btnRegistrar"
                        class="w-full bg-black text-white font-black text-lg py-3 rounded-full hover:bg-gray-800 transition-all mt-4 disabled:opacity-40 disabled:cursor-not-allowed">
                    Registrarme
                </button>
            </form>
        </div>
    </div>

    <script>
        const passwordInput   = document.getElementById('newPassword');
        const confirmInput    = document.getElementById('confirmPassword');
        const msg             = document.getElementById('msgConfirm');
        const btnRegistrar    = document.getElementById('btnRegistrar');

        function validarContrasenas() {
            const pass    = passwordInput.value;
            const confirm = confirmInput.value;

            if (confirm === '') {
                msg.classList.add('hidden');
                btnRegistrar.disabled = false;
                return;
            }

            msg.classList.remove('hidden');

            if (pass === confirm) {
                msg.textContent = '✓ Las contraseñas coinciden';
                // Usando color Success #06C270
                msg.style.color = '#06C270';
                confirmInput.style.borderColor = '#06C270';
                btnRegistrar.disabled = false;
            } else {
                msg.textContent = '✗ Las contraseñas no coinciden';
                // Usando color Error #FF3B3B
                msg.style.color = '#FF3B3B';
                confirmInput.style.borderColor = '#FF3B3B';
                btnRegistrar.disabled = true;
            }
        }

        confirmInput.addEventListener('input', validarContrasenas);
        passwordInput.addEventListener('input', validarContrasenas);
    </script>
</body>
</html>
