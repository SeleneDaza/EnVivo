<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}"/>
    
    <title>EnVivo - Mis Favoritos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-effect {
            background: rgba(115, 115, 115, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-[#f3f4f6]">

<nav class="flex items-center justify-between px-10 py-6 bg-white shadow-sm">
    <div class="text-3xl font-black text-[#ff5a1f] tracking-tighter">
        <a th:href="@{/main}">EnVivo</a>
    </div>

    <div class="flex items-center gap-6">
        <a th:href="@{/main}" class="text-sm font-bold text-gray-500 hover:text-[#ff5a1f] transition-colors">
            Volver a la Cartelera
        </a>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="text-sm font-bold text-gray-500 hover:text-red-500 transition-colors">
                Cerrar sesión
            </button>
        </form>
    </div>
</nav>

<main class="max-w-[1400px] mx-auto p-10">

    <div class="mb-10 border-b pb-4">
        <h1 class="text-4xl font-black text-gray-800">Tus Eventos Favoritos ❤️</h1>
        <p class="text-gray-500 mt-2">Aquí están los eventos que te interesan, ordenados desde el más próximo.</p>
    </div>

    <div th:if="${eventos.empty}" class="text-center py-20 bg-white rounded-3xl shadow-sm">
        <span class="text-6xl block mb-4">-</span>
        <h2 class="text-2xl font-bold text-gray-700">Aún no tienes eventos favoritos</h2>
        <p class="text-gray-500 mt-2 mb-6">Explora la cartelera y dale al corazón en los eventos que te interesen.</p>
        <a th:href="@{/main}" class="px-6 py-3 bg-[#ff5a1f] text-white font-bold rounded-full hover:bg-orange-600 transition">
            Ir a la Cartelera
        </a>
    </div>

    <div th:if="${!eventos.empty}" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-8">
        
        <div th:each="evento : ${eventos}"
             class="relative group aspect-[3/4.2] rounded-[2.5rem] overflow-hidden shadow-2xl bg-white hover:scale-[1.02] transition-transform duration-300">

            <img th:src="${evento.image}" alt="Poster del evento" class="w-full h-full object-cover">

            <button th:data-event-id="${evento.event_id}"
                    onclick="toggleInterest(this)"
                    class="absolute top-6 right-6 p-2 rounded-full glass-effect text-red-500 opacity-80 hover:opacity-100 transition-all duration-300 group/btn">
                <svg class="w-5 h-5 transition-transform duration-300 group-hover/btn:scale-110 svg-heart"
                     fill="currentColor" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                    </path>
                </svg>
            </button>

            <div class="absolute bottom-10 left-1/2 -translate-x-1/2 w-[85%] glass-effect rounded-[1.5rem] p-5 text-white">
                <h3 class="text-lg font-bold leading-tight mb-4 truncate" th:text="${evento.name}">Nombre</h3>
                <div class="flex justify-between items-center text-[11px] font-medium tracking-wide">
                    <div class="flex items-center gap-2">
                        <span th:text="${#temporals.format(evento.date, 'dd MMM yyyy')}">Fecha</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="text-lg font-light opacity-70">$</span>
                        <span class="text-base font-bold" th:text="${evento.price}">Precio</span>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-3 w-full text-center">
                <p th:if="${evento.category != null}"
                   th:text="${evento.category.name}"
                   class="text-[10px] font-black text-black tracking-[0.3em] uppercase opacity-60">
                </p>
            </div>
        </div>
    </div>
</main>

<script>
    function toggleInterest(buttonElement) {
        const eventId = buttonElement.getAttribute('data-event-id');
        const headers = { 'Content-Type': 'application/json' };
        const csrfTokenMeta = document.querySelector('meta[name="_csrf"]');
        const csrfHeaderMeta = document.querySelector('meta[name="_csrf_header"]');
        
        if (csrfTokenMeta && csrfHeaderMeta) {
            headers[csrfHeaderMeta.getAttribute('content')] = csrfTokenMeta.getAttribute('content');
        }

        fetch(`/evento/${eventId}/interest`, {
            method: 'POST',
            headers: headers
        })
        .then(response => response.json())
        .then(data => {
            alert(data.message); 
            // Si el cliente desmarcó el evento, escondemos la tarjeta o recargamos la página para que desaparezca
            if (!data.interested) {
                // Opción rápida: recargar la página para que la lista se actualice
                window.location.reload();
            }
        })
        .catch(error => console.error('Error:', error));
    }
</script>

</body>
</html>
