<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}"/>
    
    <title>EnVivo - Mis Favoritos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                main: '#FF6F28',
                darker: '#BF371C',
                lighter: '#FFCA99',
                subtle: '#E3EDFF',
                error: '#FF3B3B',
                success: '#06C270',
              }
            }
          }
        }
    </script>
    <style>
        .glass-effect {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-[#f8f9fa]">

<div th:replace="components/navbar :: navbar('user','')"></div>

<main class="max-w-[1400px] mx-auto p-10">

    <div class="mb-10 border-b border-gray-200 pb-6">
        <h1 class="text-4xl font-black text-gray-800">Tus Eventos Favoritos <span class="text-error">❤️</span></h1>
        <p class="text-gray-500 mt-2 font-medium">Aquí están los eventos que te interesan, ordenados desde el más próximo.</p>
    </div>

    <div th:if="${eventos.isEmpty()}" class="text-center py-20 bg-white rounded-[3rem] shadow-sm border border-gray-50">
        <div class="bg-subtle w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
            <span class="text-4xl text-main font-bold">!</span>
        </div>
        <h2 class="text-2xl font-bold text-gray-700">Aún no tienes eventos favoritos</h2>
        <p class="text-gray-400 mt-2 mb-8 max-w-sm mx-auto">Explora la cartelera y dale al corazón en los eventos que te interesen.</p>
        <a th:href="@{/}" class="px-8 py-3 bg-main text-white font-black rounded-full hover:bg-darker transition-all shadow-lg shadow-main/20">
            Ir a la Cartelera
        </a>
    </div>

    <div th:if="${!eventos.isEmpty()}" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-8">
        
        <div th:each="evento : ${eventos.content}"
             class="relative group aspect-[3/4.2] rounded-[2.5rem] overflow-hidden shadow-xl bg-white hover:scale-[1.02] transition-transform duration-300">

            <img th:src="${evento.image}" alt="Poster del evento" class="w-full h-full object-cover">

            <button th:data-event-id="${evento.event_id}"
                    onclick="toggleInterest(this)"
                    class="absolute top-6 right-6 p-2 rounded-full glass-effect text-error opacity-100 hover:scale-110 transition-all duration-300">
                <svg class="svg-heart w-5 h-5" fill="currentColor" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                    </path>
                </svg>
            </button>

            <div class="absolute bottom-10 left-1/2 -translate-x-1/2 w-[85%] glass-effect rounded-[1.5rem] p-5 text-white">
                <h3 class="text-lg font-bold leading-tight mb-4 truncate" th:text="${evento.name}">Nombre</h3>
                <div class="flex justify-between items-center text-[11px] font-medium tracking-wide">
                    <div class="flex items-center gap-2">
                        <span th:text="${#temporals.format(evento.date, 'dd MMM yyyy')}">Fecha</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="text-lg font-light opacity-70">$</span>
                        <span class="text-base font-bold" th:text="${evento.price}">Precio</span>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-3 w-full text-center">
                <p th:if="${evento.category != null}"
                   th:text="${evento.category.name}"
                   class="text-[9px] font-black text-white/60 tracking-[0.3em] uppercase">
                </p>
            </div>
        </div>
    </div>
    <div th:if="${eventos.totalPages > 1}" class="mt-12 sm:mt-16 flex flex-wrap justify-center items-center gap-3 sm:gap-4">
        <a th:href="@{/favorites(page=${eventos.number - 1})}"
           th:classappend="${!eventos.hasPrevious()} ? 'pointer-events-none opacity-30' : 'hover:bg-lighter'"
           class="px-4 sm:px-5 py-2 rounded-full bg-white border border-gray-200 text-xs sm:text-sm font-bold transition-colors">
            Anterior
        </a>

        <div class="flex flex-wrap gap-2">
            <a th:each="i : ${#numbers.sequence(0, eventos.totalPages - 1)}"
               th:href="@{/favorites(page=${i})}"
               th:text="${i + 1}"
               th:classappend="${eventos.number == i} ? 'bg-main text-white' : 'bg-white hover:border-main'"
               class="w-8 h-8 sm:w-10 sm:h-10 
                      flex items-center justify-center 
                      rounded-full border border-gray-200 
                      text-xs sm:text-sm font-bold 
                      transition-all">
            </a>
        </div>

        <a th:href="@{/favorites(page=${eventos.number + 1})}"
           th:classappend="${!eventos.hasNext()} ? 'pointer-events-none opacity-30' : 'hover:bg-lighter'"
           class="px-4 sm:px-5 py-2 rounded-full bg-white border border-gray-200 text-xs sm:text-sm font-bold transition-colors">
            Siguiente
        </a>
    </div>
</main>

<script>
    function toggleInterest(buttonElement) {
        const eventId = buttonElement.getAttribute('data-event-id');
        const headers = { 'Content-Type': 'application/json' };
        const csrfTokenMeta = document.querySelector('meta[name="_csrf"]');
        const csrfHeaderMeta = document.querySelector('meta[name="_csrf_header"]');
        
        if (csrfTokenMeta && csrfHeaderMeta) {
            headers[csrfHeaderMeta.getAttribute('content')] = csrfTokenMeta.getAttribute('content');
        }

        fetch(`/evento/${eventId}/interest`, {
            method: 'POST',
            headers: headers
        })
        .then(response => response.json())
        .then(data => {
            if (!data.interested) {
                // Efecto de desvanecimiento antes de recargar para mejor UX
                buttonElement.closest('.relative').style.opacity = '0.5';
                window.location.reload();
            }
        })
        .catch(error => console.error('Error:', error));
    }
</script>

</body>
</html>
