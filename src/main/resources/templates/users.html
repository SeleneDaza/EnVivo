<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EnVivo | Administración de Usuarios</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                main: '#FF6F28',
                darker: '#BF371C',
                lighter: '#FFCA99',
                subtle: '#E3EDFF',
                error: '#FF3B3B',
                warning: '#FFCC00',
                info: '#0063F7',
                success: '#06C270',
              }
            }
          }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-[#f8f9fa] min-h-screen">

<div th:replace="~{components/navbar :: navbar('admin','users')}"></div>

<main class="max-w-5xl mx-auto mt-12 px-6 mb-20">
    
    <div class="mb-10 flex items-end justify-between">
        <div>
            <h1 class="text-4xl font-black text-gray-800 tracking-tight">Gestión de <span class="text-info">Usuarios</span></h1>
            <p class="text-gray-500 font-medium mt-1">Lista centralizada de los usuarios registrados en la plataforma.</p>
        </div>
    </div>

    <section class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-gray-100 h-fit">

        <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center bg-white">
            <h3 class="text-gray-800 font-black flex items-center gap-3 text-lg uppercase tracking-tighter">
                <i class="fa-solid fa-users text-info"></i>
                Usuarios Registrados
            </h3>
            <span class="text-[10px] bg-main/10 text-main px-3 py-1 rounded-full font-black uppercase tracking-widest"
                  th:text="${#lists.size(usuarios) + ' total'}"></span>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-gray-50/50 border-b border-gray-100">
                    <tr class="text-gray-400 text-[10px] uppercase tracking-[0.2em]">
                        <th class="px-8 py-6 font-black w-20 text-center">N°</th>
                        <th class="px-8 py-6 font-black">Usuario / Email</th>
                        <th class="px-8 py-6 font-black text-center">Estado</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-50">
                    <tr th:each="u, iterStat : ${usuarios}" class="group hover:bg-subtle/20 transition-all">
                        
                        <td class="px-8 py-5 text-center">
                            <div class="w-10 h-10 mx-auto flex items-center justify-center rounded-2xl font-black text-sm shadow-sm bg-gray-50 text-gray-400 group-hover:bg-info group-hover:text-white transition-all">
                                <span th:text="${iterStat.count}">1</span>
                            </div>
                        </td>

                        <td class="px-8 py-5">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-2xl bg-info/10 flex items-center justify-center text-info font-bold group-hover:bg-info group-hover:text-white transition-all shadow-sm">
                                    <i class="fa-solid fa-user text-sm"></i>
                                </div>
                                <span class="font-black text-gray-800 text-sm group-hover:text-info transition-colors"
                                      th:text="${u.email}">Email</span>
                            </div>
                        </td>

                        <td class="px-8 py-5 text-center">
                            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-lg bg-success/10 text-success text-[10px] font-black uppercase tracking-widest">
                                <i class="fa-solid fa-circle text-[6px]"></i> Activo
                            </span>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="3" class="text-center py-16">
                            <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-300">
                                <i class="fa-solid fa-users text-2xl"></i>
                            </div>
                            <p class="text-gray-400 text-sm font-black uppercase tracking-widest">
                                No hay usuarios registrados
                            </p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
