<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EnVivo | Administración de Usuarios</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                main: '#FF6F28',
                darker: '#BF371C',
                lighter: '#FFCA99',
                subtle: '#E3EDFF',
                error: '#FF3B3B',
                warning: '#FFCC00',
                info: '#0063F7',
                success: '#06C270',
              }
            }
          }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-[#f8f9fa] min-h-screen">

<nav class="bg-white px-10 py-4 flex justify-between items-center shadow-sm border-b border-gray-100">
    <div class="flex items-center gap-2">
        <a th:href="@{/main}" class="text-2xl font-black text-main tracking-tighter">EnVivo</a>
        <span class="text-[10px] px-2 py-0.5 bg-error/10 text-error font-black uppercase rounded-md tracking-widest">
            admin
        </span>
    </div>

    <div class="flex items-center gap-4 text-sm">
        <a th:href="@{/admin}"
           class="px-6 py-2 border border-main text-main font-bold rounded-full hover:bg-subtle transition-all">
            Eventos
        </a>

        <a th:href="@{/categories}"
           class="px-6 py-2 border border-main text-main font-bold rounded-full hover:bg-subtle transition-all">
            Categorías
        </a>

        <a th:href="@{/reports}"
           class="px-6 py-2 border border-main text-main font-bold rounded-full hover:bg-subtle transition-all">
            Reportes
        </a>

        <a th:href="@{/users}"
           class="px-6 py-2 bg-main text-white font-bold rounded-full shadow-md shadow-main/20 transition-all">
            Usuarios
        </a>
    </div>

    <form th:action="@{/logout}" method="POST" class="inline">
        <button type="submit"
            class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:bg-error/10 hover:text-error transition-all border border-gray-100">
            <i class="fa-solid fa-power-off text-sm"></i>
        </button>
    </form>
</nav>

<main class="max-w-[1400px] mx-auto p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">

    <section class="lg:col-span-8 bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-gray-100 h-fit">

        <div class="px-8 py-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
            <h3 class="font-black text-gray-700 uppercase tracking-wide text-sm">
                Usuarios registrados al sistema
            </h3>

            <span class="text-[10px] bg-main/10 text-main px-3 py-1 rounded-full font-black uppercase tracking-widest"
                  th:text="${#lists.size(usuarios) + ' total'}"></span>
        </div>

        <div class="p-8">

            <div class="divide-y divide-gray-50">

                <div th:each="u : ${usuarios}"
                     class="flex items-center justify-between py-5 group hover:bg-subtle/20 transition-all px-4 rounded-2xl">

                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-2xl bg-main/10 flex items-center justify-center text-main font-bold group-hover:bg-main group-hover:text-white transition-all">
                            <i class="fa-solid fa-user text-sm"></i>
                        </div>

                        <div class="flex flex-col">
                            <span class="font-black text-gray-800 text-sm group-hover:text-main transition-colors"
                                  th:text="${u.email}">
                            </span>
                        </div>
                    </div>

                </div>

                <div th:if="${#lists.isEmpty(usuarios)}" class="text-center py-16">
                    <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-300">
                        <i class="fa-solid fa-users text-2xl"></i>
                    </div>
                    <p class="text-gray-400 text-sm font-black uppercase tracking-widest">
                        No hay usuarios registrados
                    </p>
                </div>

            </div>
        </div>
    </section>

</main>
</body>
</html>
