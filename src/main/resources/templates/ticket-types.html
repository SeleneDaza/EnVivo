<!DOCTYPE html>
<html lang="es" xml:lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EnVivo | Administracion de Tipos de Entrada</title>

    <script src="https://cdn.tailwindcss.com/3.4.1" integrity="sha384-elHashGeneradoVaAqui" crossorigin="anonymous"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                main: '#FF6F28',
                darker: '#BF371C',
                lighter: '#FFCA99',
                subtle: '#E3EDFF',
                error: '#FF3B3B',
                warning: '#FFCC00',
                info: '#0063F7',
                success: '#06C270',
              }
            }
          }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-[#f8f9fa] h-screen overflow-hidden flex">

<div th:replace="~{components/sidebar :: sidebar('ticket-types')}"></div>

<div class="flex-1 h-screen overflow-y-auto">
    <main class="max-w-[1400px] mx-auto p-8">

        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-2xl font-black text-gray-800 tracking-tighter">Tipos de Entrada</h2>
                <p class="text-sm text-gray-500 font-medium mt-1">Configura localidades y precios base</p>
            </div>
            <button type="button" id="open-ticket-type-modal" class="px-6 py-3 rounded-full bg-main text-white text-xs font-black uppercase tracking-widest hover:bg-darker transition-colors border-none shadow-md flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> Añadir
            </button>
        </div>

        <div th:if="${param.exito != null or param.error_validacion != null or param.error_general != null}" class="mb-6">
            <div th:if="${param.exito != null}" class="p-4 rounded-2xl bg-success/10 border border-success/30 text-success text-sm font-bold flex items-center gap-3">
                <i class="fa-solid fa-circle-check"></i> Tipo de entrada procesado correctamente.
            </div>
            <div th:if="${param.error_validacion != null or param.error_general != null}" class="p-4 rounded-2xl bg-error/10 border border-error/30 text-error text-sm font-bold flex items-center gap-3">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span th:text="${param.error_validacion != null ? 'Verifica el nombre del tipo de entrada.' : 'Ha ocurrido un error inesperado.'}"></span>
            </div>
        </div>

        <section class="bg-white rounded-[2.5rem] shadow-sm overflow-hidden border border-gray-100 h-fit">
            <div class="px-8 py-5 border-b border-gray-100 bg-gray-50/50">
                <h3 class="text-main font-black flex items-center gap-2 text-sm uppercase tracking-widest">
                    <i class="fa-solid fa-ticket"></i> Tipos de Entrada Actuales
                </h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50/50 border-b border-gray-100">
                        <tr class="text-gray-400 text-[10px] uppercase tracking-[0.2em]">
                            <th class="px-8 py-6 font-black">Nombre</th>
                            <th class="px-8 py-6 font-black text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50">
                        <tr th:each="t : ${tiposEntrada}" class="group hover:bg-subtle/20 transition-all">
                            <td class="px-8 py-5 flex items-center gap-4">
                                <div class="w-12 h-12 rounded-2xl bg-main/10 flex items-center justify-center text-main font-bold group-hover:bg-main group-hover:text-white transition-all">
                                    <i class="fa-solid fa-ticket text-sm"></i>
                                </div>
                                <span class="font-black text-gray-800 text-sm group-hover:text-main transition-colors"
                                      th:text="${t.name}">
                                </span>
                            </td>
                            <td class="px-8 py-5 text-center">
                                <div class="flex items-center justify-center gap-2">
                                    <a th:href="@{/ticket-types/edit/{id}(id=${t.id})}"
                                       class="btn-icon bg-info/5 text-info hover:bg-info hover:text-white">
                                        <i class="fa-solid fa-pencil text-xs"></i>
                                    </a>
                                    <form th:action="@{/ticket-types/delete/{id}(id=${t.id})}"
                                          method="post"
                                          onsubmit="return confirm('¿Eliminar este tipo de entrada?')"
                                          class="inline-flex">
                                        <button type="submit"
                                                aria-label="Eliminar tipo de entrada"
                                                class="btn-icon bg-error/5 text-error hover:bg-error hover:text-white border-none">
                                            <i class="fa-solid fa-trash-can text-xs"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(tiposEntrada)}">
                            <td colspan="2" class="text-center py-16">
                                <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4 text-gray-300">
                                    <i class="fa-solid fa-ticket text-2xl"></i>
                                </div>
                                <p class="text-gray-400 text-sm font-black uppercase tracking-widest">
                                    No hay tipos de entrada registrados
                                </p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </main>
</div>

<div id="ticket-type-modal"
     class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4"
     th:attr="data-edit-open=${tipoEntrada.id != null}">
    <div class="relative w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        <button type="button"
                id="close-ticket-type-modal"
                aria-label="Cerrar formulario"
                class="absolute right-4 top-4 z-10 btn-icon bg-error/5 text-error hover:bg-error hover:text-white">
            <i class="fa-solid fa-xmark text-sm"></i>
        </button>
        <section th:replace="~{components/forms :: ticketTypeForm}"></section>
    </div>
</div>

<script>
    const ticketTypeModal = document.getElementById('ticket-type-modal');
    const openTicketTypeModal = document.getElementById('open-ticket-type-modal');
    const closeTicketTypeModal = document.getElementById('close-ticket-type-modal');

    function showTicketTypeModal() {
        if (!ticketTypeModal) return;
        ticketTypeModal.classList.remove('hidden');
        ticketTypeModal.classList.add('flex');
    }

    function hideTicketTypeModal() {
        if (!ticketTypeModal) return;
        ticketTypeModal.classList.remove('flex');
        ticketTypeModal.classList.add('hidden');
    }

    if (openTicketTypeModal) {
        openTicketTypeModal.addEventListener('click', showTicketTypeModal);
    }

    if (closeTicketTypeModal) {
        closeTicketTypeModal.addEventListener('click', hideTicketTypeModal);
    }

    if (ticketTypeModal) {
        ticketTypeModal.addEventListener('click', (event) => {
            if (event.target === ticketTypeModal) {
                hideTicketTypeModal();
            }
        });

        if (ticketTypeModal.dataset.editOpen === 'true') {
            showTicketTypeModal();
        }
    }
</script>
</body>
</html>
