<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>EnVivo - Cartelera de Eventos</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                main: '#FF6F28',
                darker: '#BF371C',
                lighter: '#FFCA99',
                subtle: '#E3EDFF',
                error: '#FF3B3B',
                warning: '#FFCC00',
                info: '#0063F7',
                success: '#06C270',
              }
            }
          }
        }
    </script>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/main.js}"></script>
</head>

<body class="bg-[#f8f9fa]">

<!-- ================= NAVBAR RESPONSIVE ================= -->

<nav class="flex flex-wrap items-center justify-between 
            px-4 sm:px-6 md:px-8 lg:px-10 
            py-4 sm:py-5 md:py-6 
            gap-4
            bg-white shadow-sm border-b border-gray-100">

    <div class="text-2xl sm:text-3xl font-black text-main tracking-tighter">
        EnVivo
    </div>

    <div class="flex flex-wrap items-center gap-3 sm:gap-4 md:gap-6 w-full md:w-auto">

        <!--<div class="relative w-full md:w-64 lg:w-80 order-3 md:order-none">
            <input type="text" placeholder="Buscar eventos"
                   class="w-full px-5 sm:px-6 py-2 rounded-full bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-lighter transition-all text-sm">
        </div>-->

        <a th:href="@{/admin}" sec:authorize="hasRole('ADMIN')"
           class="px-4 sm:px-6 py-2 bg-main text-white text-sm font-semibold rounded-full shadow-md hover:bg-darker transition-colors">
             Administrador
        </a>

        <a th:href="@{/}" sec:authorize="isAnonymous()"
           class="text-xs sm:text-sm font-bold text-gray-400 hover:text-error transition-colors">
            Iniciar Sesión
        </a>

        <a th:href="@{/favorites}"
           sec:authorize="hasAuthority('CLIENTE') or hasAuthority('ROLE_CLIENTE')"
           class="px-4 sm:px-6 py-2 bg-white text-main border border-main text-sm font-semibold rounded-full hover:bg-subtle transition-all">
            Mis Favoritos
        </a>

        <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
            <button type="submit" class="text-xs sm:text-sm font-bold text-gray-400 hover:text-error transition-colors">
                Cerrar sesión
            </button>
        </form>
    </div>
</nav>

<!-- ================= MAIN ================= -->

<main class="max-w-[1600px] 
             mx-auto 
             px-4 sm:px-6 md:px-8 lg:px-10 
             py-8 md:py-10 lg:py-12">

    <!-- GRID RESPONSIVE -->
    <div class="grid grid-cols-1 
                sm:grid-cols-2 
                md:grid-cols-3 
                lg:grid-cols-4 
                xl:grid-cols-5 
                gap-6 sm:gap-8">

        <div th:each="evento : ${eventos.content}"
             th:onclick="openModal([[${evento.name}]], [[${evento.image}]], [[${#temporals.format(evento.date, 'dd MMM yyyy')}]], [[${evento.price}]], [[${evento.category?.name}]], [[${evento.description}]])"
             class="relative group 
                    aspect-[3/4] sm:aspect-[3/4.2] 
                    rounded-[2rem] sm:rounded-[2.5rem] 
                    overflow-hidden shadow-xl bg-white 
                    hover:scale-[1.02] 
                    transition-transform duration-300 cursor-pointer">

            <img th:src="${evento.image}" alt="Poster" class="w-full h-full object-cover">

            <!-- FAVORITO -->
            <button sec:authorize="isAuthenticated() and !hasAuthority('ADMIN') and !hasAuthority('ROLE_ADMIN')"
                    th:data-event-id="${evento.event_id}"
                    onclick="toggleInterest(this)"
                    th:classappend="${misFavoritos != null and misFavoritos.contains(evento.event_id)} ? 'text-error' : 'text-white'"
                    class="absolute top-4 sm:top-6 right-4 sm:right-6 p-2 rounded-full glass-effect opacity-80 hover:opacity-100 hover:text-error transition-all duration-300 group/btn">

                <svg class="svg-heart w-5 h-5 transition-transform duration-300 group-hover/btn:scale-110"
                     th:attr="fill=${misFavoritos != null and misFavoritos.contains(evento.event_id)} ? 'currentColor' : 'none'"
                     stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
            </button>

            <!-- INFO -->
            <div class="absolute 
                        bottom-4 sm:bottom-8 md:bottom-10 
                        left-1/2 -translate-x-1/2 
                        w-[90%] sm:w-[85%] 
                        glass-effect 
                        rounded-[1.2rem] sm:rounded-[1.5rem] 
                        p-4 sm:p-5 
                        text-white">

                <h3 class="text-base sm:text-lg font-bold leading-tight mb-3 sm:mb-4 truncate"
                    th:text="${evento.name}">
                    Nombre
                </h3>

                <div class="flex justify-between items-center text-[11px] font-medium tracking-wide">
                    <span th:text="${#temporals.format(evento.date, 'dd MMM yyyy')}">Fecha</span>
                    <div class="flex items-center gap-1">
                        <span class="text-lg font-light opacity-70">$</span>
                        <span class="text-base font-bold" th:text="${evento.price}">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- PAGINACIÓN RESPONSIVE -->
    <div class="mt-12 sm:mt-16 flex flex-wrap justify-center items-center gap-3 sm:gap-4">

        <a th:href="@{/main(page=${eventos.number - 1})}"
           th:classappend="${!eventos.hasPrevious()} ? 'pointer-events-none opacity-30' : 'hover:bg-lighter'"
           class="px-4 sm:px-5 py-2 rounded-full bg-white border border-gray-200 text-xs sm:text-sm font-bold transition-colors">
            Anterior
        </a>

        <div class="flex flex-wrap gap-2">
            <a th:each="i : ${#numbers.sequence(0, eventos.totalPages - 1)}"
               th:href="@{/main(page=${i})}"
               th:text="${i + 1}"
               th:classappend="${eventos.number == i} ? 'bg-main text-white' : 'bg-white hover:border-main'"
               class="w-8 h-8 sm:w-10 sm:h-10 
                      flex items-center justify-center 
                      rounded-full border border-gray-200 
                      text-xs sm:text-sm font-bold 
                      transition-all">
            </a>
        </div>

        <a th:href="@{/main(page=${eventos.number + 1})}"
           th:classappend="${!eventos.hasNext()} ? 'pointer-events-none opacity-30' : 'hover:bg-lighter'"
           class="px-4 sm:px-5 py-2 rounded-full bg-white border border-gray-200 text-xs sm:text-sm font-bold transition-colors">
            Siguiente
        </a>
    </div>
</main>

<!-- ================= MODAL RESPONSIVE ================= -->

<div id="eventModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 sm:p-6">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>

    <div class="relative 
                bg-white 
                w-full 
                max-w-lg sm:max-w-xl md:max-w-2xl 
                rounded-[2rem] sm:rounded-[3rem] 
                overflow-hidden shadow-2xl 
                flex flex-col md:flex-row 
                max-h-[90vh]">

        <div class="w-full md:w-1/2 h-56 sm:h-64 md:h-auto">
            <img id="modalImg" src="" alt="Evento" class="w-full h-full object-cover">
        </div>

        <div class="w-full md:w-1/2 p-6 sm:p-8 flex flex-col justify-center">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-darker transition-colors">
                ✕
            </button>

            <span id="modalCat" class="text-[10px] font-black text-main tracking-[0.3em] uppercase mb-2">
                CATEGORÍA
            </span>

            <h2 id="modalName" class="text-2xl sm:text-3xl font-black text-gray-900 leading-tight mb-4">
                Nombre
            </h2>

            <div class="flex items-center gap-4 mb-6">
                <div class="bg-subtle px-4 py-2 rounded-2xl text-sm font-bold text-info" id="modalDate">
                    Fecha
                </div>
                <div class="text-xl sm:text-2xl font-black text-gray-900">
                    $<span id="modalPrice">0</span>
                </div>
            </div>

            <p id="modalDesc" class="text-gray-500 text-sm leading-relaxed mb-8 overflow-y-auto">
                Descripción...
            </p>
        </div>
    </div>
</div>

</body>
</html>
