<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>EnVivo - Cartelera de Eventos</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .glass-effect {
            background: rgba(115, 115, 115, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>

<body class="bg-[#f3f4f6]">

<!-- ================= NAVBAR ================= -->
<nav class="flex items-center justify-between px-10 py-6 bg-white shadow-sm">

    <div class="text-3xl font-black text-[#ff5a1f] tracking-tighter">
        EnVivo
    </div>

    <div class="flex items-center gap-6">

        <!-- Buscador -->
        <div class="relative w-full">
            <input type="text" placeholder="Buscar eventos"
                   class="w-full px-6 py-2 rounded-full bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-200 transition-all">
        </div>

        <!-- ADMIN -->
        <a th:href="@{/admin}"
           sec:authorize="hasRole('ADMIN')"
           class="px-6 py-2 bg-[#ff7f50] text-white font-semibold rounded-full shadow-sm hover:bg-[#e67348] transition">
            Administrador
        </a>

        <!-- LOGIN -->
        <a th:href="@{/}"
           sec:authorize="isAnonymous()"
           class="text-sm font-bold text-gray-500 hover:text-red-500 transition-colors">
            Iniciar Sesión
        </a>

        <!-- LOGOUT -->
        <form th:action="@{/logout}" method="post"
              sec:authorize="isAuthenticated()">
            <button type="submit"
                    class="text-sm font-bold text-gray-500 hover:text-red-500 transition-colors">
                Cerrar sesión
            </button>
        </form>

    </div>
</nav>


<!-- ================= EVENTOS ================= -->
<main class="max-w-[1400px] mx-auto p-10">

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-8">

        <div th:each="evento : ${eventos.content}"
             class="relative group aspect-[3/4.2] rounded-[2.5rem] overflow-hidden shadow-2xl bg-white hover:scale-[1.02] transition-transform duration-300">

            <img th:src="${evento.image}"
                 alt="Poster del evento"
                 class="w-full h-full object-cover">

            <!-- ❤️ Solo autenticado -->
            <button sec:authorize="isAuthenticated()"
                    th:data-event-id="${evento.event_id}"
                    onclick="toggleInterest(this)"
                    th:classappend="${misFavoritos != null and misFavoritos.contains(evento.event_id)} ? 'text-red-500' : 'text-white'"
                    class="absolute top-6 right-6 p-2 rounded-full glass-effect opacity-80 hover:opacity-100 hover:text-red-500 transition-all duration-300 group/btn">
                <svg class="w-5 h-5 transition-transform duration-300 group-hover/btn:scale-110 svg-heart"
                     th:attr="fill=${misFavoritos != null and misFavoritos.contains(evento.event_id)} ? 'currentColor' : 'none'"
                     stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          stroke-width="2"
                          d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                    </path>
                </svg>
            </button>

            <!-- Info -->
            <div class="absolute bottom-10 left-1/2 -translate-x-1/2 w-[85%] glass-effect rounded-[1.5rem] p-5 text-white">

                <h3 class="text-lg font-bold leading-tight mb-4 truncate"
                    th:text="${evento.name}">
                    Nombre del Evento
                </h3>

                <div class="flex justify-between items-center text-[11px] font-medium tracking-wide">

                    <div class="flex items-center gap-2">
                        <span th:text="${#temporals.format(evento.date, 'dd MMM yyyy')}">
                            Fecha
                        </span>
                    </div>

                    <div class="flex items-center gap-1">
                        <span class="text-lg font-light opacity-70">$</span>
                        <span class="text-base font-bold"
                              th:text="${evento.price}">
                            Precio
                        </span>
                    </div>

                </div>
            </div>

            <!-- Categoría -->
            <div class="absolute bottom-3 w-full text-center">
                <p th:if="${evento.category != null}"
                   th:text="${evento.category.name}"
                   class="text-[10px] font-black text-black tracking-[0.3em] uppercase opacity-60">
                </p>
            </div>

        </div>
    </div>

    <!-- ================= PAGINACIÓN ================= -->

    <div class="mt-16 flex justify-center items-center gap-4">

        <!-- Anterior -->
        <a th:href="@{/main(page=${eventos.number - 1})}"
           th:classappend="${!eventos.hasPrevious()} ? 'pointer-events-none opacity-30' : 'hover:bg-orange-500 hover:text-white'"
           class="px-5 py-2 rounded-full bg-white border border-gray-200 text-sm font-bold transition-colors">
            Anterior
        </a>

        <!-- Números -->
        <div class="flex gap-2">
            <a th:each="i : ${#numbers.sequence(0, eventos.totalPages - 1)}"
               th:href="@{/main(page=${i})}"
               th:text="${i + 1}"
               th:classappend="${eventos.number == i} ? 'bg-[#ff5a1f] text-white' : 'bg-white hover:bg-gray-100'"
               class="w-10 h-10 flex items-center justify-center rounded-full border border-gray-200 text-sm font-bold transition-all">
            </a>
        </div>

        <!-- Siguiente -->
        <a th:href="@{/main(page=${eventos.number + 1})}"
           th:classappend="${!eventos.hasNext()} ? 'pointer-events-none opacity-30' : 'hover:bg-orange-500 hover:text-white'"
           class="px-5 py-2 rounded-full bg-white border border-gray-200 text-sm font-bold transition-colors">
            Siguiente
        </a>

    </div>

    <!-- Info página -->
    <div class="text-center mt-4 text-xs text-gray-400 font-medium uppercase tracking-widest">
        Página <span th:text="${eventos.number + 1}">1</span>
        de <span th:text="${eventos.totalPages}">5</span>
    </div>

</main>

<script>
    function toggleInterest(buttonElement) {
        // 1. Obtenemos el ID del evento del botón
        const eventId = buttonElement.getAttribute('data-event-id');
        const svgElement = buttonElement.querySelector('.svg-heart');
        
        // 2. Preparamos las cabeceras de seguridad CSRF
        const headers = { 'Content-Type': 'application/json' };
        const csrfTokenMeta = document.querySelector('meta[name="_csrf"]');
        const csrfHeaderMeta = document.querySelector('meta[name="_csrf_header"]');
        
        if (csrfTokenMeta && csrfHeaderMeta) {
            headers[csrfHeaderMeta.getAttribute('content')] = csrfTokenMeta.getAttribute('content');
        }

        // 3. Hacemos la petición a nuestro nuevo controlador
        fetch(`/evento/${eventId}/interest`, {
            method: 'POST',
            headers: headers
        })
        .then(response => {
            if (!response.ok && response.status !== 401) {
                throw new Error('Error de servidor');
            }
            return response.json();
        })
        .then(data => {
            // Cumpliendo el RF09: Mostramos notificación al usuario
            if (data.message) {
                alert(data.message); 
            }

            // Cambiamos el estilo del corazón dinámicamente
            if (data.interested) {
                buttonElement.classList.remove('text-white');
                buttonElement.classList.add('text-red-500');
                svgElement.setAttribute('fill', 'currentColor'); // Corazón relleno
            } else {
                buttonElement.classList.add('text-white');
                buttonElement.classList.remove('text-red-500');
                svgElement.setAttribute('fill', 'none'); // Corazón vacío
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('No pudimos procesar tu solicitud en este momento.');
        });
    }
</script>

</body>
</html>
