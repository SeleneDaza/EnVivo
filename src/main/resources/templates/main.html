<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>EnVivo - Cartelera de Eventos</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                main: '#FF6F28',
                darker: '#BF371C',
                lighter: '#FFCA99',
                subtle: '#E3EDFF',
                error: '#FF3B3B',
                warning: '#FFCC00',
                info: '#0063F7',
                success: '#06C270',
              }
            }
          }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-[#f8f9fa]">

<div th:replace="components/navbar :: navbar('user','')"></div>

<main class="max-w-[1600px] 
             mx-auto 
             px-4 sm:px-6 md:px-8 lg:px-10 
             py-8 md:py-10 lg:py-12">

    <div class="grid grid-cols-1 
                sm:grid-cols-2 
                md:grid-cols-3 
                lg:grid-cols-4 
                xl:grid-cols-5 
                gap-6 sm:gap-8">

        <div th:each="evento : ${eventos.content}"
             th:onclick="openEventDetail([[${evento.event_id}]])"
             class="relative group
                    aspect-[3/4] sm:aspect-[3/4.2] 
                    rounded-[2rem] sm:rounded-[2.5rem] 
                    overflow-hidden shadow-xl bg-white 
                    hover:scale-[1.02] 
                    transition-transform duration-300 cursor-pointer">

            <img th:src="${evento.image}" alt="Poster" class="w-full h-full object-cover">
    
            <button sec:authorize="isAuthenticated() and !hasAuthority('ADMIN') and !hasAuthority('ROLE_ADMIN')"
                    th:data-event-id="${evento.event_id}"
                    onclick="event.stopPropagation(); toggleInterest(this)"
                    th:classappend="${misFavoritos != null and misFavoritos.contains(evento.event_id)} ? 'text-error' : 'text-white'"
                    class="absolute top-4 sm:top-6 right-4 sm:right-6 p-2 rounded-full glass-effect opacity-80 hover:opacity-100 hover:text-error transition-all duration-300 group/btn">

                <svg class="svg-heart w-5 h-5 transition-transform duration-300 group-hover/btn:scale-110"
                     th:attr="fill=${misFavoritos != null and misFavoritos.contains(evento.event_id)} ? 'currentColor' : 'none'"
                     stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
            </button>

            <div class="absolute 
                        bottom-4 sm:bottom-8 md:bottom-10 
                        left-1/2 -translate-x-1/2 
                        w-[90%] sm:w-[85%] 
                        glass-effect 
                        rounded-[1.2rem] sm:rounded-[1.5rem] 
                        p-4 sm:p-5 
                        text-white">

                <h3 class="text-base sm:text-lg font-bold leading-tight mb-3 sm:mb-4 truncate"
                    th:text="${evento.name}">
                    Nombre
                </h3>

                <div class="flex justify-between items-center text-[11px] font-medium tracking-wide">
                    <span th:text="${#temporals.format(evento.date, 'dd MMM yyyy')}">Fecha</span>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${eventos.totalPages > 1}" class="mt-12 sm:mt-16 flex flex-wrap justify-center items-center gap-3 sm:gap-4">

        <a th:href="@{/(page=${eventos.number - 1}, keyword=${keyword})}"
           th:classappend="${!eventos.hasPrevious()} ? 'pointer-events-none opacity-30' : 'hover:bg-lighter'"
           class="px-4 sm:px-5 py-2 rounded-full bg-white border border-gray-200 text-xs sm:text-sm font-bold transition-colors">
            Anterior
        </a>

        <div class="flex flex-wrap gap-2">
            <a th:each="i : ${#numbers.sequence(0, eventos.totalPages - 1)}"
               th:href="@{/(page=${i}, keyword=${keyword})}"
               th:text="${i + 1}"
               th:classappend="${eventos.number == i} ? 'bg-main text-white' : 'bg-white hover:border-main'"
               class="w-8 h-8 sm:w-10 sm:h-10 
                      flex items-center justify-center 
                      rounded-full border border-gray-200 
                      text-xs sm:text-sm font-bold 
                      transition-all">
            </a>
        </div>

        <a th:href="@{/(page=${eventos.number + 1}, keyword=${keyword})}"
           th:classappend="${!eventos.hasNext()} ? 'pointer-events-none opacity-30' : 'hover:bg-lighter'"
           class="px-4 sm:px-5 py-2 rounded-full bg-white border border-gray-200 text-xs sm:text-sm font-bold transition-colors">
            Siguiente
        </a>
    </div>
</main>

<div id="eventModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 sm:p-6">
   
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>

    <div class="relative
                bg-white
                w-full
                max-w-lg sm:max-w-xl md:max-w-3xl
                h-auto md:h-[75vh]
                max-h-[90vh]
                rounded-[2rem] sm:rounded-[3rem]
                overflow-hidden shadow-2xl
                flex flex-col md:flex-row">

        <div class="w-full md:w-1/2 h-64 sm:h-72 md:h-full">
            <img id="modalImg" src="" alt="Evento" class="w-full h-full object-cover">
        </div>

        <div class="w-full md:w-1/2 p-6 sm:p-8 flex flex-col justify-start overflow-hidden">

            <button onclick="closeModal()"
                    class="absolute top-6 right-6 text-gray-400 hover:text-darker transition-colors">
                ✕
            </button>

            <span id="modalCat"
                  class="text-[10px] font-black text-main tracking-[0.3em] uppercase mb-2">
                CATEGORÍA
            </span>

            <h2 id="modalName"
                class="text-2xl sm:text-3xl font-black text-gray-900 leading-tight mb-4">
                Nombre
            </h2>

            <div class="flex items-center gap-4 mb-4">
                <div class="bg-subtle px-4 py-2 rounded-2xl text-sm font-bold text-info" id="modalDate">
                    Fecha
                </div>
            </div>

            <p id="modalDesc"
               class="text-gray-500 text-sm leading-relaxed pr-2 mb-4">
                Descripción...
            </p>

            <section class="overflow-y-auto flex-1 pr-2">
                <h3 class="text-xs font-black text-gray-400 uppercase tracking-[0.2em] mb-2">Entradas</h3>
                <div id="modalTickets" class="space-y-2 text-sm text-gray-700">
                    <p class="text-gray-400">Cargando entradas...</p>
                </div>
            </section>

        </div>
    </div>
</div>

<script th:src="@{/js/main.js}" defer></script>

</body>
</html>
