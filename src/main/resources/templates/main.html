<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta th:if="${_csrf != null}" name="_csrf" th:content="${_csrf.token}"/>
    <meta th:if="${_csrf != null}" name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>EnVivo - Cartelera de Eventos</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/main.js}"></script>
</head>

<body class="bg-[#f3f4f6]">

<nav class="flex items-center justify-between px-10 py-6 bg-white shadow-sm">
    <div class="text-3xl font-black text-[#ff5a1f] tracking-tighter">EnVivo</div>
    <div class="flex items-center gap-6">
        <div class="relative w-full">
            <input type="text" placeholder="Buscar eventos"
                   class="w-full px-6 py-2 rounded-full bg-gray-50 border border-gray-200 focus:outline-none focus:ring-2 focus:ring-orange-200 transition-all">
        </div>
        <a th:href="@{/admin}" sec:authorize="hasRole('ADMIN')"
           class="px-6 py-2 bg-[#ff7f50] text-white font-semibold rounded-full shadow-sm hover:bg-[#e67348] transition">
            Administrador
        </a>
        <a th:href="@{/}" sec:authorize="isAnonymous()"
           class="text-sm font-bold text-gray-500 hover:text-red-500 transition-colors">
            Iniciar Sesión
        </a>

        <a th:href="@{/favorites}"
           sec:authorize="hasAuthority('CLIENTE') or hasAuthority('ROLE_CLIENTE')"
           class="px-6 py-2 bg-white text-[#ff5a1f] border border-[#ff5a1f] font-semibold rounded-full shadow-sm hover:bg-orange-50 transition">
            Mis Favoritos
        </a>

        <!-- LOGOUT -->
        <form th:action="@{/logout}" method="post"
              sec:authorize="isAuthenticated()">
            <button type="submit"
                    class="text-sm font-bold text-gray-500 hover:text-red-500 transition-colors">
                Cerrar sesión
            </button>
        </form>
    </div>
</nav>

<main class="max-w-[1400px] mx-auto p-10">

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-8">

        <div th:each="evento : ${eventos.content}"
             th:onclick="openModal([[${evento.name}]], [[${evento.image}]], [[${#temporals.format(evento.date, 'dd MMM yyyy')}]], [[${evento.price}]], [[${evento.category?.name}]], [[${evento.description}]])"
             class="relative group aspect-[3/4.2] rounded-[2.5rem] overflow-hidden shadow-2xl bg-white hover:scale-[1.02] transition-transform duration-300 cursor-pointer">

            <img th:src="${evento.image}" alt="Poster" class="w-full h-full object-cover">

            <!-- ❤️ Solo autenticado -->
            <button sec:authorize="isAuthenticated() and !hasAuthority('ADMIN') and !hasAuthority('ROLE_ADMIN')"
                    th:data-event-id="${evento.event_id}"
                    onclick="toggleInterest(this)"
                    th:classappend="${misFavoritos != null and misFavoritos.contains(evento.event_id)} ? 'text-red-500' : 'text-white'"
                    class="absolute top-6 right-6 p-2 rounded-full glass-effect opacity-80 hover:opacity-100 hover:text-red-500 transition-all duration-300 group/btn">
                <svg class="w-5 h-5 transition-transform duration-300 group-hover/btn:scale-110 svg-heart"
                     th:attr="fill=${misFavoritos != null and misFavoritos.contains(evento.event_id)} ? 'currentColor' : 'none'"
                     stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          stroke-width="2"
                          d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z">
                    </path>
                </svg>
            </button>

            <div class="absolute bottom-10 left-1/2 -translate-x-1/2 w-[85%] glass-effect rounded-[1.5rem] p-5 text-white">
                <h3 class="text-lg font-bold leading-tight mb-4 truncate" th:text="${evento.name}">Nombre</h3>
                <div class="flex justify-between items-center text-[11px] font-medium tracking-wide">
                    <span th:text="${#temporals.format(evento.date, 'dd MMM yyyy')}">Fecha</span>
                    <div class="flex items-center gap-1">
                        <span class="text-lg font-light opacity-70">$</span>
                        <span class="text-base font-bold" th:text="${evento.price}">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-16 flex justify-center items-center gap-4">
        <a th:href="@{/main(page=${eventos.number - 1})}" th:classappend="${!eventos.hasPrevious()} ? 'pointer-events-none opacity-30' : 'hover:bg-orange-500'" class="px-5 py-2 rounded-full bg-white border border-gray-200 text-sm font-bold">Anterior</a>
        <div class="flex gap-2">
            <a th:each="i : ${#numbers.sequence(0, eventos.totalPages - 1)}" th:href="@{/main(page=${i})}" th:text="${i + 1}" th:classappend="${eventos.number == i} ? 'bg-[#ff5a1f] text-white' : 'bg-white'" class="w-10 h-10 flex items-center justify-center rounded-full border border-gray-200 text-sm font-bold"></a>
        </div>
        <a th:href="@{/main(page=${eventos.number + 1})}" th:classappend="${!eventos.hasNext()} ? 'pointer-events-none opacity-30' : 'hover:bg-orange-500'" class="px-5 py-2 rounded-full bg-white border border-gray-200 text-sm font-bold">Siguiente</a>
    </div>

</main>

<div id="eventModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 sm:p-6">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
    
    <div class="relative bg-white w-full max-w-2xl rounded-[3rem] overflow-hidden shadow-2xl flex flex-col md:flex-row max-h-[90vh]">
        
        <div class="w-full md:w-1/2 h-64 md:h-auto">
            <img id="modalImg" src="" alt="Evento" class="w-full h-full object-cover">
        </div>

        <div class="w-full md:w-1/2 p-8 flex flex-col justify-center">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-black transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>

            <span id="modalCat" class="text-[10px] font-black text-[#ff5a1f] tracking-[0.3em] uppercase mb-2">CATEGORÍA</span>
            <h2 id="modalName" class="text-3xl font-black text-gray-900 leading-tight mb-4">Nombre del Evento</h2>
            
            <div class="flex items-center gap-4 mb-6">
                <div class="bg-gray-100 px-4 py-2 rounded-2xl text-sm font-bold text-gray-600" id="modalDate">Fecha</div>
                <div class="text-2xl font-black text-gray-900">$<span id="modalPrice">0</span></div>
            </div>

            <p id="modalDesc" class="text-gray-500 text-sm leading-relaxed mb-8 overflow-y-auto">
                Descripción detallada del evento...
            </p>

            <!-- <button class="w-full py-4 bg-black text-white font-bold rounded-2xl hover:bg-gray-800 transition-all">
                Reservar Entradas
            </button> -->
        </div>
    </div>
</div>

<script>
    function openModal(name, image, date, price, category, description) {
        document.getElementById('modalName').innerText = name;
        document.getElementById('modalImg').src = image;
        document.getElementById('modalDate').innerText = date;
        document.getElementById('modalPrice').innerText = price;
        document.getElementById('modalCat').innerText = category || 'GENERAL';
        document.getElementById('modalDesc').innerText = description || 'No hay descripción disponible para este evento.';
        
        const modal = document.getElementById('eventModal');
        modal.classList.remove('hidden');
        document.body.classList.add('modal-open');
    }

    function closeModal() {
        const modal = document.getElementById('eventModal');
        modal.classList.add('hidden');
        document.body.classList.remove('modal-open');
    }

    // Cerrar con la tecla ESC
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeModal();
    });
</script>
</body>
</html>
