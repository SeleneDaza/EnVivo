name: EnVivo CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    # 1. Levantamos un contenedor de PostgreSQL efímero para que pase el test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: events_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Ejecutar Build y Tests
      # Con 'verify' nos aseguramos de compilar (build) y correr las pruebas (test)
      run: mvn clean verify
      env:
        # Pasamos las variables de entorno que tu application.yaml necesita
        DB_URL: jdbc:postgresql://localhost:5432/events_db
        DB_USERNAME: postgres
        DB_PASSWORD: test_password
        # Variables simuladas de Cloudinary (solo para que no falle la inyección de dependencias)
        CLOUDINARY_CLOUD_NAME: test_cloud
        CLOUDINARY_API_KEY: test_key
        CLOUDINARY_API_SECRET: test_secret